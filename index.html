<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريادة الأعمال - مراجعة للاختبار</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --accent: #e8834a;
    --accent2: #4a7de8;
    --accent3: #4ae8a0;
    --text: #f0eee8;
    --muted: #8888aa;
    --border: #2a2a42;
    --correct: #2a5c3f;
    --wrong: #5c2a2a;
    --correct-text: #4ae8a0;
    --wrong-text: #e84a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(74,125,232,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(232,131,74,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; position: relative; z-index: 1; }

  header {
    text-align: center;
    padding: 40px 0 32px;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 1.05rem; }

  .mode-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }
  .mode-tab {
    padding: 10px 22px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab.active, .mode-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,131,74,0.1);
  }
  .mode-tab.active { font-weight: 700; }

  /* FLASHCARD MODE */
  #mode-flashcard { display: block; }
  #mode-quiz, #mode-match, #mode-summary { display: none; }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 10px;
    height: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-label {
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 8px;
  }

  .flashcard-scene {
    perspective: 1200px;
    width: 100%;
    max-width: 700px;
    margin: 0 auto 28px;
    cursor: pointer;
  }
  .flashcard {
    width: 100%;
    min-height: 240px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,2,.4,1);
  }
  .flashcard.flipped { transform: rotateY(180deg); }

  .flashcard-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 18px;
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    text-align: center;
  }
  .flashcard-front {
    background: var(--card-bg);
    min-height: 240px;
    position: relative;
  }
  .flashcard-back {
    background: linear-gradient(135deg, #1a2a1e, #1a1a2e);
    border-color: var(--accent3);
    transform: rotateY(180deg);
    min-height: 240px;
    position: absolute;
    inset: 0;
  }
  .flashcard-category {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 16px;
    font-weight: 700;
  }
  .flashcard-q {
    font-size: 1.35rem;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
  }
  .flashcard-a {
    font-size: 1.1rem;
    line-height: 1.8;
    color: var(--text);
  }
  .flashcard-hint {
    position: absolute;
    bottom: 14px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .card-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 11px 24px;
    border-radius: 30px;
    border: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #d4713a; transform: translateY(-2px); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--correct); color: var(--correct-text); border: 1px solid var(--correct-text); }
  .btn-danger { background: var(--wrong); color: var(--wrong-text); border: 1px solid var(--wrong-text); }

  /* QUIZ MODE */
  .quiz-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .quiz-q {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .quiz-category {
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: block;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 14px 18px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    text-align: right;
    transition: all 0.15s;
  }
  .option:hover:not(:disabled) { border-color: var(--accent2); background: rgba(74,125,232,0.1); }
  .option.correct { border-color: var(--correct-text); background: var(--correct); }
  .option.wrong { border-color: var(--wrong-text); background: var(--wrong); }
  .option:disabled { cursor: default; }

  .quiz-score {
    text-align: center;
    padding: 40px;
    background: var(--card-bg);
    border-radius: 18px;
    border: 1.5px solid var(--border);
  }
  .quiz-score h2 { font-size: 2rem; margin-bottom: 8px; }
  .score-num { font-size: 3.5rem; font-weight: 800; color: var(--accent); }

  /* SUMMARY MODE */
  .summary-section {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .summary-section h3 {
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .summary-row {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-term {
    font-weight: 700;
    color: var(--accent2);
    min-width: 160px;
    flex-shrink: 0;
    font-size: 0.95rem;
  }
  .summary-def { color: var(--text); font-size: 0.95rem; line-height: 1.6; }

  /* MATCH MODE */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .match-item {
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    cursor: pointer;
    text-align: center;
    font-size: 0.95rem;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .match-item:hover { border-color: var(--accent2); }
  .match-item.selected { border-color: var(--accent); background: rgba(232,131,74,0.15); color: var(--accent); }
  .match-item.matched { border-color: var(--correct-text); background: var(--correct); opacity: 0.6; cursor: default; }
  .match-item.wrong-flash { border-color: var(--wrong-text); background: var(--wrong); animation: shake 0.4s; }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
  }

  /* TRUE/FALSE MODE */
  .tf-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 36px 28px;
    margin-bottom: 20px;
    text-align: center;
  }
  .tf-statement {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.7;
    margin-bottom: 24px;
    color: var(--text);
  }
  .tf-buttons { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; }
  .tf-btn {
    padding: 14px 44px;
    border-radius: 14px;
    border: 2px solid transparent;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tf-true { background: rgba(74,232,160,0.1); border-color: var(--correct-text); color: var(--correct-text); }
  .tf-false { background: rgba(232,74,74,0.1); border-color: var(--wrong-text); color: var(--wrong-text); }
  .tf-true:hover { background: var(--correct); }
  .tf-false:hover { background: var(--wrong); }
  .tf-feedback {
    padding: 16px 20px;
    border-radius: 12px;
    font-size: 1rem;
    line-height: 1.6;
    margin-top: 12px;
    display: none;
  }
  .tf-feedback.show { display: block; }
  .tf-feedback.correct { background: var(--correct); border: 1px solid var(--correct-text); color: var(--correct-text); }
  .tf-feedback.wrong { background: var(--wrong); border: 1px solid var(--wrong-text); color: var(--wrong-text); }
  .tf-score { text-align:center; color: var(--muted); font-size:0.95rem; margin-bottom:14px; }
  .tf-score span { color: var(--accent); font-weight:700; }

  /* FILL IN THE BLANK MODE */
  .fillin-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px;
    margin-bottom: 20px;
  }
  .fillin-prompt {
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.8;
    margin-bottom: 20px;
    color: var(--text);
  }
  .fillin-blank {
    display: inline-block;
    border-bottom: 3px solid var(--accent2);
    min-width: 120px;
    color: var(--accent2);
    font-weight: 800;
  }
  .fillin-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .fillin-option {
    padding: 13px 18px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    cursor: pointer;
    text-align: right;
    transition: all 0.15s;
  }
  .fillin-option:hover:not(:disabled) { border-color: var(--accent2); background: rgba(74,125,232,0.1); }
  .fillin-option.correct { border-color: var(--correct-text); background: var(--correct); }
  .fillin-option.wrong { border-color: var(--wrong-text); background: var(--wrong); }
  .fillin-option:disabled { cursor: default; }
  .fillin-score { text-align:center; color: var(--muted); font-size:0.95rem; margin-bottom:14px; }
  .fillin-score span { color: var(--accent2); font-weight:700; }

  /* TIMED SPRINT MODE */
  .timed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 22px;
  }
  .timed-timer {
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    min-width: 60px;
    text-align: center;
  }
  .timed-timer.warning { color: var(--wrong-text); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .timed-info { color: var(--muted); font-size:0.95rem; }
  .timed-info span { color: var(--accent3); font-weight:700; }
  .timed-card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .timed-q { font-size:1.15rem; font-weight:700; margin-bottom:16px; line-height:1.6; }
  .timed-cat { font-size:0.78rem; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; display:block; }
  .timed-options { display:flex; flex-direction:column; gap:8px; }
  .timed-option {
    padding: 11px 16px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    text-align: right;
    transition: all 0.1s;
  }
  .timed-option:hover:not(:disabled) { border-color: var(--accent2); background: rgba(74,125,232,0.1); }
  .timed-option.correct { border-color: var(--correct-text); background: var(--correct); }
  .timed-option.wrong { border-color: var(--wrong-text); background: var(--wrong); }
  .timed-option:disabled { cursor:default; }
  .timed-results {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 40px;
    text-align: center;
  }
  .timed-big-score { font-size: 3.5rem; font-weight:800; color: var(--accent3); }
  .timed-stats { display:flex; gap:24px; justify-content:center; margin:20px 0; flex-wrap:wrap; }
  .timed-stat { background: rgba(74,125,232,0.07); border-radius:12px; padding:14px 22px; }
  .timed-stat-num { font-size:1.6rem; font-weight:800; color:var(--accent2); }
  .timed-stat-label { font-size:0.85rem; color:var(--muted); margin-top:2px; }
  .timed-start {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 48px 32px;
    text-align: center;
  }
  .timed-start h2 { font-size:1.6rem; font-weight:800; margin-bottom:12px; color:var(--accent3); }
  .timed-start p { color:var(--muted); margin-bottom:24px; line-height:1.7; font-size:1rem; }

  .match-score-bar {
    text-align: center;
    margin-bottom: 16px;
    font-size: 1.1rem;
    color: var(--muted);
  }
  .match-score-bar span { color: var(--accent); font-weight: 700; }

  .hidden { display: none !important; }

  @media(max-width:600px) {
    header h1 { font-size: 1.8rem; }
    .flashcard-q { font-size: 1.1rem; }
    .match-grid { grid-template-columns: 1fr; }
    .summary-row { flex-direction: column; gap: 4px; }
    .summary-term { min-width: unset; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ريادة الأعمال</h1>
    <p>أداة مراجعة تفاعلية — الحصص 1 و2 و3 و4 و5 و6</p>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flashcard')">🃏 بطاقات تعليمية</button>
    <button class="mode-tab" onclick="setMode('quiz')">✅ اختبار متعدد الخيارات</button>
    <button class="mode-tab" onclick="setMode('match')">🔗 مطابقة المفاهيم</button>
    <button class="mode-tab" onclick="setMode('truefalse')">⚡ صح أو خطأ</button>
    <button class="mode-tab" onclick="setMode('fillin')">✏️ أكمل الفراغ</button>
    <button class="mode-tab" onclick="setMode('timed')">⏱️ سباق الزمن</button>
    <button class="mode-tab" onclick="setMode('summary')">📖 ملخص شامل</button>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="mode-flashcard">
    <div class="progress-label" id="fc-progress-label">البطاقة 1 من 30</div>
    <div class="progress-bar-wrap"><div class="progress-bar-inner" id="fc-progress" style="width:3%"></div></div>

    <div class="flashcard-scene" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-category" id="fc-category"></div>
          <div class="flashcard-q" id="fc-question"></div>
          <div class="flashcard-hint">اضغط للكشف عن الإجابة</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-category" style="color:var(--accent3)">الإجابة</div>
          <div class="flashcard-a" id="fc-answer"></div>
        </div>
      </div>
    </div>

    <div class="card-nav">
      <button class="btn btn-outline" onclick="prevCard()">→ السابقة</button>
      <button class="btn btn-danger" onclick="markCard(false)">لا أعرفها ✗</button>
      <button class="btn btn-success" onclick="markCard(true)">أعرفها ✓</button>
      <button class="btn btn-outline" onclick="nextCard()">التالية ←</button>
    </div>
    <div style="text-align:center;margin-top:14px;">
      <button class="btn btn-outline" onclick="shuffleCards()" style="font-size:0.9rem;padding:8px 18px;">🔀 خلط البطاقات</button>
      <button class="btn btn-outline" onclick="resetCards()" style="font-size:0.9rem;padding:8px 18px;margin-right:8px;">↺ إعادة التشغيل</button>
    </div>
  </div>

  <!-- QUIZ MODE -->
  <div id="mode-quiz">
    <div id="quiz-container"></div>
  </div>

  <!-- MATCH MODE -->
  <div id="mode-match">
    <div class="match-score-bar">تم مطابقة <span id="match-score">0</span> من <span id="match-total">0</span></div>
    <div class="match-grid" id="match-grid"></div>
    <div style="text-align:center">
      <button class="btn btn-primary" onclick="startMatch()">بدء جديد 🔀</button>
    </div>
  </div>

  <!-- TRUE/FALSE MODE -->
  <div id="mode-truefalse" style="display:none">
    <div id="tf-container"></div>
  </div>

  <!-- FILL IN THE BLANK MODE -->
  <div id="mode-fillin" style="display:none">
    <div id="fillin-container"></div>
  </div>

  <!-- TIMED SPRINT MODE -->
  <div id="mode-timed" style="display:none">
    <div id="timed-container"></div>
  </div>

  <!-- SUMMARY MODE -->
  <div id="mode-summary"></div>
</div>

<script>
const cards = [
  // الحصة الأولى
  { cat: "مفهوم ريادة الأعمال", q: "ما هي ريادة الأعمال؟", a: "عملية دينامية لخلق قيمة، عبر استغلال فرصة في سياق يتسم بعدم اليقين، بمبادرة فردية أو جماعية قائمة على الإبداع وتحمل المخاطر." },
  { cat: "مفهوم ريادة الأعمال", q: "ما هي المعادلة الأساسية لريادة الأعمال؟", a: "ريادة الأعمال = فكرة + فرصة + تنفيذ + قيمة" },
  { cat: "أنواع القيمة", q: "ما هي أنواع القيمة التي تخلقها ريادة الأعمال؟", a: "القيمة الاقتصادية (بيع منتج أو خدمة وتحقيق دخل)، القيمة الاجتماعية (حل مشكلة اجتماعية أو بيئية)، القيمة التنظيمية (تحسين طريقة العمل داخل مؤسسة)." },
  { cat: "رائد الأعمال", q: "كيف يُعرَّف رائد الأعمال؟", a: "الشخص الذي يبادر إلى إنشاء وتسيير مشروع اقتصادي أو اجتماعي، ويتحمل المسؤولية الكاملة عن القرارات والمخاطر المرتبطة به، بهدف خلق قيمة جديدة في السوق." },
  { cat: "رائد الأعمال", q: "ما هي الأدوار الثلاثة الرئيسية لرائد الأعمال (ما وراء التأسيس)؟", a: "1) الابتكار المستمر، 2) استغلال الفرص، 3) تحويل الأفكار إلى واقع." },
  { cat: "الفروق الأساسية", q: "ما الفرق بين ريادة الأعمال ورائد الأعمال والمقاولة؟", a: "ريادة الأعمال = المسار والعملية، رائد الأعمال = الفاعل الذي يقود العملية، المقاولة = الإطار القانوني والتنظيمي (الكيان الاقتصادي)." },
  { cat: "الفروق الأساسية", q: "ما الفرق بين رائد الأعمال والمدير؟", a: "رائد الأعمال: يركز على الابتكار وخلق الفرص ويعمل في بيئة غير مؤكدة. المدير: يركز على التسيير والاستقرار ويعمل وفق قواعد وإجراءات واضحة." },
  { cat: "الأخطاء الشائعة", q: "صحح هذه الخرافة: 'كل من يملك مقاولة هو رائد أعمال'", a: "خطأ. قد تكون المقاولة تقليدية (نسخ فكرة مطعم مثلاً) بدون عقلية ريادية أو قيمة مضافة." },
  { cat: "الأخطاء الشائعة", q: "صحح هذه الخرافة: 'الريادة تتطلب رأسمالاً كبيراً للبدء'", a: "خطأ. يمكن البدء بنموذج أولي بسيط ثم التطوير. الريادة هي تحويل الموارد المحدودة إلى نتائج." },
  { cat: "الدور الاقتصادي", q: "ما هو الدور الاقتصادي لريادة الأعمال؟", a: "خلق فرص الشغل، خلق الثروة ودفع النمو المحلي، تطوير الابتكار والتنافسية." },
  { cat: "الدور الاجتماعي", q: "ما هو الدور الاجتماعي لريادة الأعمال؟", a: "حل مشاكل المجتمع (نقل، تعليم، صحة)، إدماج الشباب والنساء، خلق 'قيمة اجتماعية' وليس فقط ربح." },
  { cat: "النظريات", q: "ما هي المقاربة الاقتصادية لريادة الأعمال ومن أبرز منظريها؟", a: "ترى ريادة الأعمال كمحرك للنمو وخلق الثروة عبر الابتكار وتدمير القديم. أبرز المنظرين: Schumpeter، Frank Knight، Israel Kirzner." },
  { cat: "النظريات", q: "ما هي المقاربة السلوكية (النفسية) لريادة الأعمال؟", a: "تركز على الفرد وسماته الشخصية: الحاجة للإنجاز، تحمل المخاطر المحسوبة، الاعتماد على الذات، الإبداع، المرونة. أبرز المنظرين: McClelland، Rotter." },
  { cat: "النظريات", q: "ما هي المقاربة المؤسساتية والاجتماعية لريادة الأعمال؟", a: "ريادة الأعمال ممارسة اجتماعية مؤطرة بسياق مؤسساتي (قوانين، ثقافة، شبكات دعم، تعليم). توفر البيئة المؤسساتية دوراً حاسماً. أبرز المنظرين: Douglass North." },
  { cat: "المخاطرة", q: "ما الفرق بين المجازفة والمخاطرة المحسوبة؟", a: "المجازفة = قرار دون معلومات (كاستثمار كل المال دون اختبار). المخاطرة المحسوبة = قرار مع بحث وتجربة واختبار (كصنع نموذج أولي واختباره مع 20 زبوناً)." },
  // الحصة الثانية
  { cat: "الخصائص الريادية", q: "ما هي الخصائص الأساسية لرائد الأعمال؟", a: "المبادرة (لا ينتظر الظروف المثالية)، الإبداع (لا يكرر فقط)، المرونة (يعدّل الفكرة عند الواقع)، المثابرة (يستمر رغم الصعوبات)، القدرة على التعلم (يستفيد من الأخطاء)." },
  { cat: "الخصائص الريادية", q: "هل الخصائص الريادية فطرية أم مكتسبة؟", a: "لا تعد هذه الخصائص بالضرورة فطرية، بل يمكن اكتسابها وتنميتها من خلال التعلم والتجربة." },
  { cat: "الأدوار العملية", q: "ما هي الأدوار العملية الخمسة لرائد الأعمال؟", a: "1) تحديد الرؤية والأهداف، 2) اتخاذ القرارات الاستراتيجية، 3) تنظيم الموارد، 4) تحمل المخاطر والمسؤولية، 5) تمثيل المشروع أمام الشركاء والزبناء." },
  { cat: "الدافعية", q: "ما هي أنواع الدافعية الريادية؟", a: "دافعية داخلية: تحقيق الذات، الشغف، حب التحدي. دافعية خارجية: الدخل، المكانة الاجتماعية، الاستقلالية. غالباً ما يجتمع النوعان." },
  { cat: "الدافعية", q: "ما هي أهم دوافع الشخص لريادة الأعمال؟", a: "تجسيد الأفكار، تحقيق الذات، الاستقلالية، تحمل المسؤولية، استغلال الفرص، مواجهة البطالة، المكانة الاجتماعية." },
  { cat: "الإبداع والابتكار", q: "ما الفرق بين الإبداع والابتكار؟", a: "الإبداع = توليد أفكار جديدة أو الربط بين عناصر موجودة بطريقة غير تقليدية. الابتكار = تحويل هذه الفكرة إلى منتج أو خدمة أو حل عملي قابل للتنفيذ في السوق. الإبداع يولّد الفكرة ← الابتكار يحوّلها إلى مشروع." },
  { cat: "المخاطر الريادية", q: "ما هي أشكال المخاطرة الريادية الثلاثة؟", a: "1) مخاطرة مالية: استثمار الأموال دون ضمان الربح. 2) مخاطرة مهنية: ترك وظيفة مستقرة. 3) مخاطرة اجتماعية: الخوف من نظرة المجتمع عند الفشل." },
  { cat: "الذكاء العاطفي", q: "ما هو الذكاء العاطفي وما أهميته في ريادة الأعمال؟", a: "قدرة الفرد على فهم مشاعره والتحكم فيها وفهم مشاعر الآخرين. يساهم في: تحسين القيادة واتخاذ القرار، بناء علاقات مهنية ناجحة، حل النزاعات، الحفاظ على تماسك الفريق." },
  { cat: "الذكاء العاطفي", q: "ما هي المكونات الأربعة للذكاء العاطفي؟", a: "1) الوعي بالذات (فهم مشاعره ونقاط قوته وضعفه)، 2) التحكم في المشاعر (ضبط الانفعالات عند الضغط)، 3) التعاطف (فهم مشاعر الآخرين)، 4) مهارات التواصل (التعبير بوضوح والإصغاء)." },
  { cat: "أمثلة واقعية", q: "كيف مثّلت Amazon نموذجاً للمخاطرة المحسوبة؟", a: "بدأت ببيع الكتب فقط، اختبرت نموذج العمل تدريجياً قبل التوسع، واعتمدت على البيانات وتجربة الزبناء في اتخاذ القرار." },
  { cat: "أمثلة واقعية", q: "ماذا يمثل فشل شركات Dot-com في نموذج الدراسة؟", a: "نموذج للمجازفة غير المحسوبة: استثمار مبالغ ضخمة دون نموذج عمل واضح أو اختبار فعلي للسوق. التمويل وحده لا يضمن النجاح." },
  { cat: "أمثلة واقعية", q: "ما الدرس الريادي المستفاد من قصة Airbnb؟", a: "تحليل المخاطر بدلاً من تجنبها، تعديل النموذج تدريجياً، المبادرة المستمرة رغم الإخفاقات الأولية. ريادة الأعمال ليست مغامرة عشوائية بل رحلة مبنية على الشجاعة والتحليل الدقيق." },
  { cat: "أمثلة واقعية", q: "ما الدرس الريادي من Tesla؟", a: "دافعية داخلية قوية (تغيير مستقبل الطاقة والنقل) + إبداع في التصميم والبرمجيات + ابتكار في المنتجات الفعلية. الدافع العميق يتجاوز المكاسب المادية." },
  { cat: "أمثلة واقعية", q: "ما الدرس الريادي من Netflix؟", a: "دافعية التكيف والابتكار المستمر: تحول جذري من تأجير DVD إلى منصة رقمية عالمية وإنتاج محتوى أصلي. القدرة على قراءة المتغيرات السوقية والتخلي عن النماذج القديمة." },
  { cat: "نظريات - ملخص", q: "ما هي علاقة الريادة الاقتصادية والداخلية والاجتماعية ببعضها؟", a: "الريادة الاقتصادية: الهدف الأساسي الربح والنمو السوقي. ريادة داخل المؤسسات: المبادرة بمشاريع ريادية من داخل وظيفة أو شركة قائمة. الريادة الاجتماعية: هدفها حل مشكلة اجتماعية مع ضمان استدامة مالية." },

  // الحصة الثالثة: مهنة رائد الأعمال وأنماط الريادة
  { cat: "الأدوار الأساسية", q: "ما هي الأدوار الأساسية الأربعة لرائد الأعمال؟", a: "1) الدور الاستراتيجي (قيادة الرؤية)، 2) الدور التنظيمي والتسييري (إدارة الموارد)، 3) الدور التمثيلي والتفاوضي (بناء الثقة)، 4) تحمل المسؤولية والمخاطر." },
  { cat: "الأدوار الأساسية", q: "ما هو الدور الاستراتيجي لرائد الأعمال وما مكوناته؟", a: "قيادة الرؤية: تحديد الرؤية طويلة المدى (رسم الصورة الكبرى للمستقبل)، صياغة الأهداف الاستراتيجية (تحويلها لأهداف واضحة ومحددة)، واختيار نموذج العمل المناسب." },
  { cat: "الأدوار الأساسية", q: "كيف جسّدت شركة IKEA الدور الاستراتيجي لرائد الأعمال؟", a: "اعتمدت رؤية قائمة على ديمقراطية الاستهلاك (أثاث جيد بأسعار في متناول الجميع)، وترجمتها في قرارات استراتيجية: نموذج Flat-pack، إشراك الزبون في التركيب، التحكم الكامل في سلسلة التوريد، والاستثمار في الاستدامة." },
  { cat: "الأدوار الأساسية", q: "ما هو الدور التنظيمي والتسييري لرائد الأعمال؟", a: "فن إدارة الموارد: تنظيم الموارد البشرية (بناء فرق عمل قوية)، تدبير الموارد المالية (إدارة الميزانيات)، وتنسيق الأنشطة داخل المشروع (ضمان التناغم بين الأقسام)." },
  { cat: "الأدوار الأساسية", q: "كيف تجلّى الدور التنظيمي في شركة Decathlon؟", a: "هيكلة تنظيمية مرنة تتحكم في كل مراحل سلسلة القيمة (تصميم، تصنيع، لوجستيك، توزيع)؛ فرق عمل مستقلة لكل رياضة، تدبير دقيق للموارد البشرية، وتنسيق فعّال بين الأقسام." },
  { cat: "الأدوار الأساسية", q: "ما هو الدور التمثيلي والتفاوضي لرائد الأعمال؟", a: "بناء الثقة: تمثيل المشروع أمام أصحاب المصلحة (مستثمرين، شركاء، عملاء)، وبناء الثقة والسمعة (نسج علاقات قوية وتعزيز مصداقية المشروع في السوق)." },
  { cat: "الأدوار الأساسية", q: "كيف نجحت Spotify في الدور التمثيلي والتفاوضي؟", a: "اعتمدت على دور تمثيلي قوي للتفاوض مع شركات الإنتاج الموسيقي الكبار رغم كونها شركة ناشئة، وبنت الثقة عبر نموذج عمل يوازن بين مصلحة الفنانين والمستخدمين، وأقنعت المستثمرين بجدوى الاشتراك." },
  { cat: "الأدوار الأساسية", q: "ما هو دور تحمل المسؤولية والمخاطر؟", a: "رائد الأعمال يقف في الخط الأمامي، مستعداً لتحمل عواقب كل قرار: تحمل نتائج القرارات (مواجهة النجاح والفشل)، المسؤولية القانونية (الالتزام بالقوانين)، والمسؤولية الأخلاقية (العمل بنزاهة تجاه العملاء والموظفين)." },
  { cat: "الأدوار الأساسية", q: "كيف جسّد جيمس دايسون مؤسس Dyson دور تحمل المخاطر؟", a: "طوّر أكثر من 5000 نموذج أولي قبل الوصول لمنتج ناجح، تحمّل تكلفة مالية شخصية مرتفعة دون ضمان النجاح، واجه رفض الشركات المصنعة، واستمر في المشروع رغم الفشل المتكرر." },
  { cat: "الكفاءات الريادية", q: "ما هي الكفاءات الثلاث الأساسية لرائد الأعمال؟", a: "1) الكفاءات التقنية: فهم جوهر النشاط واتخاذ قرارات تقنية واعية. 2) الكفاءات التسييرية: تنظيم الموارد والتخطيط الفعال. 3) الكفاءات الإنسانية: بناء علاقات قوية وقيادة فعالة." },
  { cat: "الكفاءات الريادية", q: "ما هي الكفاءات التقنية لرائد الأعمال؟", a: "القدرة على فهم جوهر النشاط (رقمي، صناعي، فلاحي أو خدمي). تشمل: الإلمام بالأسس التقنية للمجال، فهم خصائص المنتج أو الخدمة، والقدرة على تحليل القيمة المقدمة للزبون. لا تتطلب أن يكون خبيراً تقنياً بل قادراً على اتخاذ قرارات تقنية واعية." },
  { cat: "الكفاءات الريادية", q: "ما هي الكفاءات التسييرية لرائد الأعمال؟", a: "القدرة على تنظيم المشروع وضبط موارده في بيئة غير مستقرة. تشمل: التخطيط المرحلي، إدارة الوقت والأولويات، اتخاذ القرار تحت الضغط، والتعامل مع المشكلات غير المتوقعة." },
  { cat: "الكفاءات الريادية", q: "ما هي الكفاءات الإنسانية لرائد الأعمال؟", a: "ترتبط بعلاقة رائد الأعمال مع نفسه وفريقه ومحيطه. تشمل: الوعي بالذات، ضبط الانفعالات، التواصل الفعال، التحفيز، التعامل مع الشركاء، بناء علاقات مع الزبائن، والقيادة التحفيزية والذكاء العاطفي." },
  { cat: "الكفاءات الريادية", q: "ما تداعيات غياب الكفاءات التسييرية في المشاريع الناشئة؟", a: "سوء التسيير يشمل: غياب التخطيط الاستراتيجي، ضعف المتابعة والتنفيذ، والقرارات الارتجالية غير المدروسة. هذه العوامل تؤدي إلى نفاد الموارد قبل الوصول إلى السوق والفشل المبكر." },
  { cat: "أنماط الريادة", q: "ما هي أنماط ريادة الأعمال الأساسية؟", a: "1) ريادة الأعمال التقليدية، 2) ريادة الأعمال المبتكرة، 3) ريادة الأعمال الاجتماعية، 4) ريادة الأعمال داخل المؤسسات، 5) ريادة الأعمال النسوية، 6) ريادة الأعمال القروية." },
  { cat: "أنماط الريادة", q: "ما هي ريادة الأعمال الاجتماعية وما جوهرها؟", a: "تركز على معالجة التحديات المجتمعية الملحة (الفقر، التعليم، الصحة) بأساليب مبتكرة ومستدامة. لا تهدف للربح فقط بل لإحداث تغيير اجتماعي إيجابي. النجاح يُقاس بحجم وعمق الأثر الاجتماعي المتحقق." },
  { cat: "أنماط الريادة", q: "ما هي ريادة الأعمال المبتكرة وما مميزاتها؟", a: "هي القوة الدافعة وراء التغيير والتقدم، تركز على تطوير حلول جديدة وغير تقليدية للمشكلات. الابتكار لا يقتصر على التكنولوجيا بل يمتد لنماذج العمل وطرق خلق القيمة. الابتكار هو جوهر النجاح وليس بالضرورة اختراع شيء جديد كلياً." },
  { cat: "أنماط الريادة", q: "ما هي ريادة الأعمال القروية وما دورها؟", a: "محرك حيوي للتنمية المحلية يركز على استغلال الموارد الطبيعية والبشرية في المناطق الريفية. تسهم في خلق فرص عمل مستدامة وتقوية الاقتصادات المحلية، مما يحد من الهجرة ويقلص الفوارق المجالية." },
  { cat: "أنماط الريادة", q: "ما هي ريادة الأعمال النسائية وما أبعادها؟", a: "تركز على التمكين الاقتصادي للمرأة من خلال دعمها لتأسيس مشاريعها الخاصة. تهدف لتجاوز العوائق الاجتماعية والثقافية والقانونية، وتعزز استقلاليتها وقدرتها على اتخاذ القرار. تساهم في إدماج طاقات مهمشة وتحقيق تنمية أكثر شمولاً." },

  // الحصة الرابعة: واقع ريادة الأعمال في السياق المغربي
  { cat: "ح4 - السياق المغربي", q: "ما تعريف ريادة الأعمال في السياق المغربي؟", a: "ريادة الأعمال هي خلق قيمة في سياق عدم اليقين. تتميز بثلاثة مكونات: خلق القيمة (تقديم حلول جديدة تلبي احتياجات السوق)، عدم اليقين (العمل في بيئة غير مؤكدة مع مخاطر محسوبة)، السياق (الإطار المحلي الذي يحدد نجاح أو فشل المشروع)." },
  { cat: "ح4 - السياق المغربي", q: "لماذا ترتبط ريادة الأعمال ارتباطاً وثيقاً بالسياق المحلي؟", a: "نفس الفكرة الريادية قد تنجح في بيئة وتفشل في أخرى، حسب العوامل الثقافية والاقتصادية والمؤسساتية. كل مشروع ريادي هو نتاج تفاعل معقد بين الفكرة والبيئة المحيطة (السياسات، التمويل، الثقافة، البنية التحتية، السوق المستهدف)." },
  { cat: "ح4 - الإحصائيات GEM", q: "ما هو مؤشر السياق الوطني لريادة الأعمال في المغرب 2024/2025؟", a: "3.9 من 10 — تراجع من 4.3 في العامين السابقين. يعكس تحسناً بطيئاً في البيئة الريادية رغم التراجع الطفيف." },
  { cat: "ح4 - الإحصائيات GEM", q: "ما هي أبرز إحصائيات GEM 2024/2025 حول ريادة الأعمال في المغرب؟", a: "المشاركة الريادية: 12.5% (تضاعفت عن العام الماضي). استمرارية الشركات: 3.3% (معدل منخفض يعكس التحديات). الخوف من الفشل: 52.3% يخشون الفشل في مشاريعهم. معرفة رائد أعمال: 78.2% من المغاربة يعرفون رائد أعمال. الحاجة مقابل الفرصة: 87.2% يبدؤون بدافع الحاجة لا الفرصة." },
  { cat: "ح4 - الإحصائيات GEM", q: "ما الملاحظة المهمة حول دوافع رواد الأعمال المغاربة؟", a: "87.2% من رواد الأعمال المغاربة يبدؤون مشاريعهم بدافع الحاجة وليس استغلال الفرص، مما يؤثر على جودة المشاريع واستدامتها. الريادة بدافع الضرورة أقل ابتكاراً وأصعب استمرارية من ريادة الفرصة." },
  { cat: "ح4 - المعيقات الفردية", q: "ما هي المعيقات الفردية لريادة الأعمال في المغرب؟", a: "1) ضعف الخبرة التسييرية: نقص في إدارة المشاريع والموارد البشرية والمالية. 2) نقص الثقافة الريادية: غياب ثقافة المقاولة في المنظومة التعليمية. 3) الخوف من الفشل (52.3%): وصمة العار تثبط الهمم. 4) ضعف الشبكات الريادية: نقص العلاقات المهنية للوصول للفرص." },
  { cat: "ح4 - المعيقات المالية", q: "ما هي المعيقات المالية لريادة الأعمال في المغرب؟", a: "1) صعوبة التمويل البنكي: البنوك تعتبر الشركات الناشئة عالية المخاطر وتشترط ضمانات تعجيزية. 2) الضمانات المطلوبة: رهن العقار والكفالات صعبة على الشباب. 3) ضعف التمويل الأولي: نقص Venture Capital في المراحل المبكرة. 4) محدودية رأس المال الجريء: 176.9 مليون دولار فقط في 2024." },
  { cat: "ح4 - المعيقات الإدارية", q: "ما هي المعيقات الإدارية والمؤسساتية في المغرب؟", a: "1) تعقيد المساطر: إجراءات إنشاء المقاولات معقدة وتحتاج وقتاً طويلاً ووثائق كثيرة. 2) بطء الإجراءات: البيروقراطية الإدارية تؤخر إطلاق المشاريع وتضيع الفرص. 3) تعدد الجهات: ضعف التنسيق بين الإدارات يصعّب على رائد الأعمال إتمام معاملاته." },
  { cat: "ح4 - المعيقات السوقية", q: "ما هي المعيقات السوقية التي تواجه رواد الأعمال المغاربة؟", a: "1) القدرة الشرائية المحدودة: متوسط الدخل المنخفض يحد من حجم السوق. 2) القطاع غير الهيكل: الاقتصاد الموازي يخلق منافسة غير عادلة للمقاولات الناشئة. 3) المنافسة الشرسة: من الشركات الكبرى والمنتجات المستوردة. 4) الثقة الرقمية: ضعف ثقة المستهلكين في التجارة الإلكترونية." },
  { cat: "ح4 - المعيقات الثقافية", q: "ما هي المعيقات الثقافية والاجتماعية لريادة الأعمال في المغرب؟", a: "1) ثقافة الوظيفة: الوظيفة العمومية تُعدّ ضمانة اجتماعية والمقاولة الخاصة تُعتبر مجازفة. 2) الخوف من الفشل: 52.3% يخشون الفشل والمجتمع ينظر إليه سلباً. 3) ضغط الأسرة: التوقعات الاجتماعية تدفع نحو المسار الآمن (طبيب، مهندس). 4) النظرة الاجتماعية: 'رجل الأعمال' قد يرتبط بصور نمطية سلبية عن الريع والفساد." },
  { cat: "ح4 - البيئة الريادية", q: "ما تعريف البيئة الريادية (Entrepreneurial Ecosystem)؟", a: "نظام متكامل من العوامل المؤسساتية والثقافية والاقتصادية التي تؤثر على إنشاء المقاولات الناشئة ونموها. هي نظام ديناميكي تتفاعل فيه عناصر متعددة: السياسات والتشريعات، التمويل والاستثمار، السوق والطلب، الثقافة الريادية، التعليم والتكوين، المؤسسات الداعمة." },
  { cat: "ح4 - البيئة الريادية", q: "ما هي نقاط القوة في البيئة الريادية المغربية؟", a: "1) الموقع الجغرافي الاستراتيجي: بوابة إفريقيا، قريب من أوروبا، اتفاقيات تجارية مع الاتحاد الأوروبي والولايات المتحدة. 2) الاستقرار السياسي: بيئة مستقرة تجذب الاستثمارات الأجنبية (أكثر من 950 شركة فرنسية). 3) بنية تحتية رقمية متطورة: استراتيجية المغرب الرقمي 2030، تغطية 5G بحلول 2030. 4) سوق إفريقي واعد: المغرب مركز اقتصادي في إفريقيا، نمو 3.2% في 2023. 5) دعم حكومي متزايد." },
  { cat: "ح4 - البيئة الريادية", q: "ما هي نقاط الضعف في البيئة الريادية المغربية؟", a: "1) ضعف الابتكار: الاستثمار في البحث والتطوير ضعيف (0.6% من الناتج المحلي)، محدودية براءات الاختراع. 2) جفوة الجامعة-المقاولة: ضعف التنسيق بين الجامعة وسوق الشغل. 3) محدودية البحث العلمي: عدد الباحثين منخفض. 4) ضعف الاستثمار في R&D. 5) غير متجانسة: فوارق كبيرة بين المدن الكبرى والمناطق القروية." },
  { cat: "ح4 - الفرص الريادية", q: "ما هي فرص الاقتصاد الرقمي في المغرب؟", a: "1) التجارة الإلكترونية: نمو سريع خاصة بعد الجائحة، فرص في B2B وB2C. 2) التطبيقات المحمولة: انتشار الهواتف الذكية يفتح آفاقاً لتطبيقات الخدمات. 3) الخدمات الرقمية: الترحيل الرقمي (Outsourcing) 140,000 موظف. 4) التحول الرقمي: رقمنة المقاولات التقليدية. استراتيجية المغرب الرقمي 2030: هدف 3000 شركة ناشئة و100 مليار درهم مساهمة في الناتج المحلي." },
  { cat: "ح4 - الفرص الريادية", q: "ما هي فرص الفلاحة الذكية (AgriTech) في المغرب؟", a: "1) التكنولوجيا الزراعية: استخدام IoT والذكاء الاصطناعي والبيانات الضخمة لتحسين الإنتاجية. 2) الري الذكي: أنظمة ري دقيق مهمة في بلد يعاني من ندرة المياه. 3) تحليل البيانات: توقع المحاصيل وتشخيص الأمراض وتحسين الجودة. 4) الزراعة العمودية: مزارع حضرية في الدار البيضاء والرباط. أهمية الفلاحة: 15% من الناتج المحلي، 40% من الشغل، 14 مليار درهم استثمار في 2025." },
  { cat: "ح4 - الفرص الريادية", q: "ما هي فرص الاقتصاد الأخضر في المغرب؟", a: "1) الطاقات المتجددة: هدف 52% من الكهرباء من مصادر متجددة بحلول 2030، أكبر مجمع شمسي في العالم بورزازات. 2) الطاقة الهيدروجينية الخضراء: المغرب يطمح لأن يصبح مصدراً رئيسياً للهيدروجين الأخضر نحو أوروبا. 3) التدوير والحلول البيئية: إعادة تدوير النفايات، إدارة المياه. مثال: كومير لإعادة تدوير جلود الأسماك. المغرب يستورد 90% من احتياجاته الطاقية → فرصة ضخمة للتحول." },
  { cat: "ح4 - الفرص الريادية", q: "ما هي فرص السياحة البديلة في المغرب؟", a: "1) السياحة القروية: الإقامة في البيوت التقليدية، تجربة الحياة الريفية، دعم التنمية المحلية. 2) السياحة البيئية: الحياة البيئية، المسارات الطبيعية، جذب السياح الباحثين عن الاستدامة. 3) السياحة الثقافية: التراث الثقافي والتاريخي، المدن العتيقة، المتاحف، المهرجانات. 4) فرصة كأس العالم 2030: استثمارات بمليارات اليورو في البنية التحتية والفنادق، هدف 26 مليون زائر. السياحة: 7% من الناتج المحلي." },
  { cat: "ح4 - آليات الدعم", q: "ما هي برامج الدعم الحكومية الرئيسية لريادة الأعمال في المغرب؟", a: "1) برنامج انطلاقة: غلاف مالي 30 مليار درهم على 5 سنوات، تمويل يصل إلى 1.2 مليون درهم لكل مستفيد، سعر فائدة 1.75% قروي و2% حضري، مستهدف للشباب والمقاولات الصغرى والفلاحين. قرض START-TPE مجاني حتى 50,000 درهم. 2) برنامج فرصة: دعم المشاريع بدون شروط مسبقة، مفتوح للجميع. 3) صندوق الابتكار: دعم البحث والتطوير وبراءات الاختراع." },
  { cat: "ح4 - آليات الدعم", q: "ما الفرق بين برامج انطلاقة وفرصة وصندوق الابتكار؟", a: "انطلاقة: يركز على التمويل (حتى 1.2 مليون درهم، مستهدف الشباب والمقاولات الصغرى والفلاحون). فرصة: يركز على المواكبة وإطلاق المشاريع (حوالي 100,000 درهم، مفتوح للجميع: حاملو الأفكار، المقاولون الذاتيون، الشركات الناشئة). صندوق الابتكار: يركز على دعم البحث والتطوير (حتى 5 ملايين درهم، للمقاولات الصناعية والشركات الناشئة الكبرى). النجاح يتطلب استغلالها بشكل متكامل." },
  { cat: "ح4 - آليات الدعم", q: "ما هي المؤسسات والحاضنات الداعمة لريادة الأعمال في المغرب؟", a: "1) Maroc PME: الوكالة الوطنية للنهوض بالمقاولة الصغرى والمتوسطة، برنامج 'استثمار' يغطي 20-30% من تكلفة المشروع. 2) Technopark: شبكة وطنية للحاضنات التكنولوجية، أكثر من 3000 مقاولة ناشئة منذ 2001، معدل استدامة 89% بعد 5 سنوات، إحداث 15,000 منصب شغل. 3) CRI: 12 مركزاً جهوياً للاستثمار، نافذة واحدة لتبسيط إجراءات الاستثمار. 4) صندوق محمد السادس للاستثمار: صناديق استثمار موضوعاتية، منحة CapAccess." },
  { cat: "ح4 - نماذج مغربية", q: "ما هو نموذج Chari وما درسه الريادي؟", a: "الفكرة: تطبيق للتجارة الإلكترونية يخدم 200,000 متجر صغير في المغرب (80% من المبيعات بالتجزئة). المشكلة: المتاجر الصغيرة تواجه صعوبة في إعادة التمويل وتضطر لإغلاق المحلات. النموذج: E-commerce + Fintech. الإنجازات: قيمة 125 مليون دولار، 25,000+ متجر، 185+ موظف، التوسع في 3 دول. الدرس: فهم عميق للسياق المحلي واستخدام WhatsApp للطلبات + التكيف مع احتياجات العملاء + التوسع الإقليمي الذكي." },
  { cat: "ح4 - نماذج مغربية", q: "ما هو نموذج Terraa وما مجال عمله؟", a: "منصة B2B لتوزيع المنتجات الغذائية الطازجة بين المزارعين والتجار (AgriTech + Supply Chain). الإنجاز: جمعت 1.5 مليون دولار في 2023 (الأكبر في تاريخ المغرب). المستثمرون: FoodLabs، UM6P Ventures، Outlierz Ventures. تحل مشكلة الوسطاء ونقل المنتجات الفلاحية من المزرعة مباشرة للتاجر." },
  { cat: "ح4 - نماذج مغربية", q: "ما هو نموذج كومير وما درسه في الاقتصاد الأخضر؟", a: "الفكرة: إعادة تدوير جلود الأسماك لإنتاج جلود بحرية عالية الجودة بديلاً لجلود الزواحف. التأثير: إعادة تدوير 40+ طناً من جلود الأسماك منذ 2016. الاستدامة: دعم الصيد المستدام، شراكات مع الصيادين المحليين. القطاع: الاقتصاد الأخضر + الموضة المستدامة. درسه: استغلال موارد مهدرة + حل مشكلة بيئية + خلق قيمة اقتصادية عالية." },
  { cat: "ح4 - عوامل النجاح", q: "ما هي عوامل نجاح المشروع الريادي في السياق المغربي؟", a: "1) فهم عميق للسياق المحلي: معرفة خصوصيات السوق المغربي، احتياجات العملاء، التحديات المؤسساتية. 2) القدرة على التكيف والمرونة: التكيف مع التغيرات، تعديل النموذج حسب الظروف، الاستفادة من التحديات كفرص. 3) الابتكار في الحلول: تقديم حلول مبتكرة ومختلفة، استخدام التكنولوجيا، خلق قيمة حقيقية للعملاء. 4) استغلال آليات الدعم: برامج انطلاقة وفرصة، الحاضنات، التمويلات المتاحة. 5) بناء شبكات علاقات قوية: مع رواد الأعمال والمستثمرين والمؤسسات الداعمة." },
  { cat: "ح4 - الخلاصة", q: "ما الخلاصة التحليلية لواقع ريادة الأعمال في المغرب؟", a: "المغرب بيئة متطورة تجمع: فرصاً واعدة (الرقمية، الفلاحة، الطاقة المتجددة، السياحة)، دعماً متزايداً (انطلاقة، فرصة، Technopark، Maroc PME، صندوق محمد السادس)، وتحديات متعددة (فردية، مالية، إدارية، ثقافية). الرسالة الأساسية: ريادة الأعمال في المغرب ليست رحلة سهلة لكنها ممكنة وواعدة لمن يمتلك الفهم العميق للسياق، والقدرة على التكيف، والإصرار على النجاح." },

  // الحصة الخامسة: البحث عن فكرة مشروع وتقييم الفرصة الريادية
  { cat: "ح5 - الفكرة vs الفرصة", q: "ما الفرق الجوهري بين الفكرة الريادية والفرصة الريادية؟", a: "الفكرة: مفهوم أو تصور لحل ما، قد يكون نظرياً وغير مختبر، لا يتطلب بالضرورة وجود سوق، ولا يضمن الربحية. الفرصة الريادية: فكرة قابلة للتنفيذ تلبي حاجة حقيقية في السوق، مبنية على حاجة حقيقية، قابلة للتطبيق بالموارد المتاحة، تقدم قيمة مضافة للعملاء وتحقق ربحية مستدامة. ملخص: الفكرة هي البذرة، والفرصة هي الشجرة المثمرة." },
  { cat: "ح5 - الفكرة vs الفرصة", q: "ما المعايير التي تحول الفكرة إلى فرصة ريادية قابلة للتنفيذ؟", a: "الحاجة: مُثبتة ومُحتملة (لا مجرد مفترضة). السوق: مُحدد وقابل للقياس. الربحية: مُحتملة ومُحسوبة. التنفيذ: خطة واضحة وقابلة للتطبيق. التميز: ميزة تنافسية واضحة. الفرصة تتحقق حين تتوافر هذه المعايير مجتمعةً." },
  { cat: "ح5 - النظريات", q: "ما نظرية شومبيتر 1934 وما إسهامها في فهم ريادة الأعمال؟", a: "نظرية الابتكار التخريبي: الريادي هو المبدع الذي يحدث تخريباً إبداعياً من خلال تقديم تركيبات جديدة من الموارد. أنواع الابتكار: منتج جديد، طريقة إنتاج جديدة، سوق جديد، مصدر مواد خام جديد. Schumpeter يركز على الابتكار والتخريب الإبداعي كمحرك للتنمية الاقتصادية." },
  { cat: "ح5 - النظريات", q: "ما نظرية كيرزنر 1973 وما مفهوم الاستبصار الريادي؟", a: "نظرية الاستبصار الريادي: الريادي هو مُستبصر يتميز باليقظة لاكتشاف الفرص المُغفلة في السوق. خصائص الاستبصار: اليقظة للفرص، رؤية ما يغفل عنه الآخرون، التصرف السريع، إعادة توازن السوق. Kirzner يركز على الاستبصار واليقظة كقدرة على اكتشاف الفرص المُغفلة." },
  { cat: "ح5 - النظريات", q: "ما نظرية شين 2003 وكيف يُعرف الفرصة الريادية؟", a: "نظرية الفرصة الريادية: الفرصة الريادية هي حالة تتيح إنشاء سلع/خدمات جديدة بأسعار تتجاوز تكاليف إنتاجها. مصادر الفرصة: التغيرات التكنولوجية، التغيرات السياسية، التغيرات الاجتماعية، عدم كفاءة السوق. Shane يركز على الفرصة كمفهوم مركزي ودراسة العوامل المؤثرة في اكتشافها." },
  { cat: "ح5 - مصادر الأفكار", q: "ما هي المصادر الخمسة الرئيسية للأفكار الريادية؟", a: "1) المشكلات اليومية: كل مشكلة تواجهها هي فرصة محتملة لإيجاد حل. 2) التغيرات التكنولوجية: التطور التكنولوجي يخلق فرصاً جديدة (الهواتف الذكية، الذكاء الاصطناعي). 3) التغيرات الاجتماعية: تغير سلوك المستهلكين يخلق احتياجات جديدة. 4) الفجوات في السوق: عدم تلبية حاجة معينة يمثل فرصة ذهبية. 5) التنظيمات الجديدة: التغيرات في القوانين واللوائح تفتح أبواباً جديدة." },
  { cat: "ح5 - الإبداع والابتكار", q: "ما الفرق بين الإبداع والابتكار وما العلاقة بينهما في الريادة؟", a: "الإبداع (Creativity): القدرة على توليد أفكار جديدة ومبتكرة. خصائصه: التفكير خارج الصندوق، الربط بين أفكار متباعدة، التخيل والتصور، المخاطرة الفكرية. الابتكار (Innovation): تطبيق الأفكار لخلق قيمة حقيقية. خصائصه: التطبيق العملي، خلق قيمة للعميل، القابلية للتنفيذ، التحسين المستمر. العلاقة: الإبداع (القدرة على التفكير) → التطبيق (التحول إلى واقع) → الابتكار (خلق القيمة)." },
  { cat: "ح5 - تقنيات التوليد", q: "ما تقنية العصف الذهني (Brainstorming) وما قواعدها الأربعة؟", a: "العصف الذهني: تقنية جماعية لتوليد أكبر عدد ممكن من الأفكار حول موضوع محدد، دون النقد أو التقييم في مرحلة التوليد. القواعد الأربعة: 1) لا نقد (جميع الأفكار مقبولة). 2) الحرية (أفكار مجنونة مرحب بها). 3) الكم (الهدف عدد الأفكار). 4) البناء (تطوير أفكار الآخرين). الأخطاء الشائعة: النقد المبكر، عدم التحضير، سيطرة الأفراد." },
  { cat: "ح5 - تقنيات التوليد", q: "ما تقنية SCAMPER وما تعني كل حرف فيها؟", a: "SCAMPER أداة منهجية لتوليد أفكار جديدة بالتلاعب بعناصر المنتج أو الخدمة الموجودة. S=Substitute (الاستبدال): ما الذي يمكن استبداله؟ C=Combine (الدمج): ما الذي يمكن دمجه؟ A=Adapt (التكيف): ما الذي يمكن تكييفه؟ M=Modify (التعديل): ما الذي يمكن تعديله؟ P=Put to other uses (استخدامات أخرى): ما هي الاستخدامات البديلة؟ E=Eliminate (الإزالة): ما الذي يمكن إزالته؟ R=Reverse (العكس): ماذا لو عكسنا العملية؟" },
  { cat: "ح5 - تقنيات التوليد", q: "ما منهجية التفكير التصميمي (Design Thinking) وما مراحلها الخمس؟", a: "منهجية إنسانية تركز على فهم المستخدم بعمق لتصميم حلول مبتكرة ومناسبة لاحتياجاته. المراحل: 1) Empathize (التعاطف): فهم المستخدم بعمق (مقابلات، ملاحظة، خريطة التعاطف). 2) Define (التعريف): تحديد المشكلة بدقة. 3) Ideate (التوليد): توليد حلول متنوعة (Brainstorming، SCAMPER، خريطة العقل). 4) Prototype (النموذج): بناء نماذج أولية (MVP). 5) Test (الاختبار): اختبار مع المستخدمين (A/B Testing)." },
  { cat: "ح5 - نموذج التقييم", q: "ما هو النموذج العلمي لتقييم الفرصة الريادية ومعاييره الستة؟", a: "نموذج شامل يغطي الجوانب الحاسمة لنجاح المشروع: 1) السوق والنمو (25%): حجم السوق TAM، معدل النمو، الاتجاهات. 2) شدة المنافسة (20%): عدد المنافسين، حصة السوق، حواجز الدخول. 3) التميز التنافسي (20%): القيمة المضافة، صعوبة التقليد، الاستدامة. 4) جدوى التنفيذ (15%): التكلفة، الوقت، التقنية. 5) الربحية (15%): نموذج العمل، الهوامش، فترة الاسترداد. 6) المخاطر (5%): السوقية، التقنية، المالية. الفرصة المثالية: 80+ من 100 نقطة." },
  { cat: "ح5 - السياق المغربي GEM", q: "ما أبرز مؤشرات GEM 2023/2024 لريادة الأعمال في المغرب؟", a: "ترتيب المغرب في NECI: 30 من 49 (تحسن من المرتبة 35 في 2022). 70% من المغاربة يرون وجود فرص ريادية (7 من كل 10). نسبة ريادة الأعمال المبكرة: 6.3% (زيادة من 4.2% في 2022). أعلى المؤشرات: البنية التحتية. أدنى المؤشرات: التعليم الريادي. التحسن في 8 من 13 مؤشراً." },
  { cat: "ح5 - السياق المغربي GEM", q: "لماذا 70% من المغاربة يرون فرصاً ريادية لكن 6.3% فقط يبدؤون فعلياً؟", a: "الفجوة بين النية (25% ينوون البدء) والريادة المبكرة (6.3% يبدؤون فعلياً) = 18.7 نقطة مئوية. العوامل المفسرة: 1) الخوف من الفشل (عائق نفسي رئيسي يمنع ثلث المقبلين). 2) نقص التمويل (صعوبة الوصول لرأس المال). 3) التعليم الريادي (ضعف في التعليم المدرسي). 4) البيروقراطية (تعقيد الإجراءات). مقارنة إقليمية: الإمارات 15.2%، مصر 9.5%، تونس 8.2%، المغرب 6.3%." },
  { cat: "ح5 - دراسات الحالة", q: "ما درس Chari في البحث عن الفرصة الريادية؟", a: "Chari (يناير 2020): حلت مشكلة 200,000 محل صغير في المغرب (80% من مبيعات التجزئة) تعاني من صعوبة تموين المخزون، تأخر التوصيل، وفقدان المبيعات. الحل: تطبيق لطلب المنتجات + توصيل خلال 24 ساعة + أسعار تنافسية + فواتير واضحة. عنصر الابتكار: التحول من e-commerce إلى fintech (دفع إلكتروني، تحويل الأموال، دفع الفواتير). التقييم 2025: 125 مليون دولار. درجة الفرصة: 46/50 نقطة." },
  { cat: "ح5 - دراسات الحالة", q: "ما فرص الاقتصاد الأخضر المغربي الريادية؟", a: "المغرب يمتلك إمكانيات هائلة في الطاقة المتجددة. Solarize: حلول الطاقة الشمسية (5 kWh/m² يومياً) للصناعات والمنازل، تخفيض فاتورة الطاقة. Terraa: AgriTech لتوزيع غذائي، ربط المزارعين بالمطاعم، تمويل 1.5 مليون دولار، تقليل الهدر الغذائي. Fertidev: إدارة النفايات العضوية وتحويلها لسماد للمزارعين والشركات، اقتصاد دائري. الفرص الكبرى: الطاقة الشمسية، طاقة الرياح، الزراعة المستدامة، الاقتصاد الدائري." },
  { cat: "ح5 - الأخطاء الشائعة", q: "ما هي الأخطاء الخمسة الشائعة في اختيار فكرة المشروع؟", a: "1) حب الفكرة: الوقوع في حب فكرة دون التحقق من وجود سوق حقيقي (تجاهل ردود الفعل السلبية). 2) تجاهل المنافسة: عدم دراسة المنافسين بدقة وفهم نقاط قوتهم وضعفهم. 3) المبالغة في السوق: تقدير حجم السوق بشكل مبالغ فيه (افتراض أن الجميع عميل محتمل). 4) إهمال الجدوى: عدم إجراء دراسة جدوى مالية شاملة قبل البدء. 5) عدم مراعاة الموارد: اختيار فكرة تتطلب موارد غير متوفرة (رأس مال، مهارات، وقت). النصيحة: دع البيانات والمنطق يقودان قرارك لا العاطفة." },
  { cat: "ح5 - متى تبدأ؟", q: "ما هي معايير قائمة المراجعة للتأكد من أن الفكرة جاهزة للتحول إلى مشروع؟", a: "الفكرة تصبح جاهزة حين تتحقق جميع هذه المعايير: 1) التحقق من الحاجة: تحدثت مع 20+ عميل محتمل، 60%+ أكدوا الحاجة للحل، فهمت أوجه القصور الحالية. 2) دراسة السوق: حجم السوق واضح ومحسوب، درست المنافسين بدقة، حددت السوق المستهدف. 3) نموذج العمل: مصادر الدخل واضحة، قنوات التوزيع محددة، العلاقة مع العملاء مخططة. 4) الجدوى المالية: التكاليف محسوبة بدقة، الإيرادات المتوقعة واقعية، فترة الاسترداد محددة. 5) فريق العمل + خطة التنفيذ. متى لا تبدأ: لم تتحقق من الحاجة، لا تملك الموارد، السوق مشبع، الربحية غير واضحة." },

  // الحصة السادسة: دراسة السوق وإنشاء المقاولة
  { cat: "ح6 - دراسة السوق", q: "ما هو تعريف دراسة السوق وفق Kotler؟", a: "دراسة السوق هي التحليل المنظم للمشكلات، وبناء النماذج، وجمع الحقائق بهدف تحسين عملية اتخاذ القرار والتحكم في تسويق السلع والخدمات. (Marketing Management, 15th Edition, 2016)" },
  { cat: "ح6 - دراسة السوق", q: "ما هي أبعاد دراسة السوق الأربعة؟", a: "1) العملاء: فهم احتياجاتهم ورغباتهم وسلوكهم الشرائي. 2) السوق: تحديد الحجم والنمو والاتجاهات. 3) المنافسة: تحليل المنافسين ونقاط القوة والضعف. 4) البيئة: العوامل الاقتصادية والاجتماعية والتنظيمية." },
  { cat: "ح6 - دراسة السوق", q: "لماذا دراسة السوق مهمة لتقليل مخاطر الإخفاق؟", a: "إحصائيات GEM: المقاولات مع دراسة سوق لها معدل نجاح 75% بعد 5 سنوات، مقابل 35% فقط للمقاولات بدون دراسة. الفرق +40% في احتمالية النجاح. 42% من أسباب الفشل هو عدم فهم السوق وفق دراسات GEM." },
  { cat: "ح6 - تحليل الطلب", q: "ما الفرق بين TAM وSAM وSOM؟", a: "TAM (السوق الكلي): حجم السوق المحتمل بالكامل. SAM (السوق المخدم): الجزء الذي يمكن خدمته فعلياً. SOM (السوق المحقق): الجزء الذي يمكن تحقيقه فعلياً. مثال مغربي: سوق توصيل الطعام — TAM: 500M درهم، SAM: 80M درهم (مراكش + وجبات صحية)، SOM: 4M درهم (5% من SAM)." },
  { cat: "ح6 - تحليل الطلب", q: "ما الفرق بين الطلب الفعلي والطلب المحتمل والفجوة السوقية؟", a: "الطلب الفعلي (Actual Demand): الكمية الفعلية المشتراة حالياً. الطلب المحتمل (Potential Demand): الحد الأقصى للطلب في ظل ظروف مثالية، يشمل العملاء الحاليين والمحتملين. الفجوة السوقية (Market Gap): الفرق بين الطلب المحتمل والفعلي — تمثل الفرصة المتاحة للمقاولات الجديدة." },
  { cat: "ح6 - سلوك المستهلك", q: "ما هي العوامل الأربعة المؤثرة في سلوك المستهلك؟", a: "1) العوامل الثقافية: الثقافة، القيم، العادات، والتقاليد المجتمعية. 2) العوامل الاجتماعية: العائلة، الأصدقاء، المرجعيات الاجتماعية، الطبقة الاجتماعية. 3) العوامل الشخصية: العمر، المهنة، نمط الحياة، الشخصية. 4) العوامل النفسية: الدوافع، الإدراك، التعلم، المعتقدات." },
  { cat: "ح6 - سلوك المستهلك", q: "ما هي مراحل عملية اتخاذ القرار الشرائي الخمسة؟", a: "1) الإدراك: اكتشاف الحاجة. 2) البحث: البحث عن المعلومات والبدائل. 3) التقييم: مقارنة الخيارات. 4) القرار: الشراء. 5) ما بعد الشراء: تقييم الرضا عن المنتج أو الخدمة." },
  { cat: "ح6 - أدوات جمع البيانات", q: "ما هي الخطوات التسع لتصميم استبيان فعال؟", a: "1) تحديد المعلومات المطلوبة. 2) تحديد المستجيبين (الفئة المستهدفة). 3) طريقة التواصل. 4) محتوى الأسئلة. 5) صياغة الأسئلة بوضوح. 6) ترتيب الأسئلة منطقياً. 7) التحقق من الطول (5-10 دقائق، 15-20 سؤالاً كحد أقصى). 8) الاختبار التجريبي على عينة صغيرة. 9) إصدار النسخة النهائية." },
  { cat: "ح6 - أدوات جمع البيانات", q: "ما الفرق بين المقابلات الهيكلية وشبه الهيكلية وغير الهيكلية؟", a: "المقابلات الهيكلية: أسئلة محددة مسبقاً بترتيب ثابت — سهلة التحليل، مناسبة للمقارنة. المقابلات شبه الهيكلية: أسئلة محددة مع مرونة في الترتيب والمتابعة — الأكثر شيوعاً، توازن بين العمق والتنظيم. المقابلات غير الهيكلية: حوار مفتوح بدون أسئلة محددة — مناسبة للاستكشاف والاكتشاف العميق." },
  { cat: "ح6 - أدوات جمع البيانات", q: "ما هي أنواع الملاحظة في جمع البيانات الأربعة؟", a: "المالحظة المباشرة: الباحث حاضر في مكان الحدث (متجر، مطعم). المالحظة غير المباشرة: استخدام كاميرات أو تسجيلات لمراقبة السلوك. المالحظة المشاركة: الباحث يشارك في النشاط (عميل سري). المالحظة غير المشاركة: يبقى الباحث بعيداً دون تفاعل." },
  { cat: "ح6 - البيانات الثانوية", q: "ما هي البيانات الثانوية وما مميزاتها وعيوبها؟", a: "البيانات الثانوية: بيانات جُمعت مسبقاً من جهات أخرى لأغراض مختلفة. المميزات: أقل تكلفة، أسرع في الحصول عليها، تغطية واسعة، مصادر متنوعة. العيوب: قد تكون غير محدثة، قد لا تناسب الدراسة، لا تحكم في الجودة، قد تكون غير دقيقة. النصيحة الذهبية: ابدأ دائماً بالبيانات الثانوية لفهم السوق، ثم استخدم الأولية لملء الفجوات." },
  { cat: "ح6 - البيانات الثانوية", q: "ما هي مصادر البيانات الثانوية الموثوقة في المغرب؟", a: "1) التقارير الحكومية: HCP، وزارة الاقتصاد، البنك المركزي. 2) الدراسات الأكاديمية: أبحاث جامعية، رسائل ماجستير ودكتوراه. 3) الجمعيات التجارية: CGEM، الغرف التجارية، الاتحادات المهنية. 4) قواعد البيانات الدولية: GEM Reports، World Bank، IMF." },
  { cat: "ح6 - تحليل المنافسة", q: "ما هو نموذج القوى الخمس لبورتر وما سياقه؟", a: "وضعه Michael Porter أستاذ في جامعة هارفارد عام 1979. يُعدّ من أهم النماذج في استراتيجية الأعمال. يحلل 5 قوى تؤثر على جاذبية الصناعة وربحيتها. الفرق عن SWOT: تحليل كلي لصناعة بأكملها، بينما SWOT تحليل جزئي يركز على شركة واحدة. يساعد في: فهم البيئة التنافسية، تحديد الفرص، تجنب المخاطر، بناء استراتيجية دخول." },
  { cat: "ح6 - القوى الخمس", q: "ما هي القوة الأولى في نموذج بورتر: التنافس بين المنافسين الحاليين؟", a: "مدى شدة المنافسة بين الشركات القائمة في السوق. العوامل المزيدة: عدد كبير من المنافسين، نمو بطيء للسوق، منتجات متشابهة (تمايز منخفض)، حواجز خروج مرتفعة، تكاليف ثابتة عالية. النتائج: حروب أسعار، تكاليف تسويق مرتفعة، انخفاض هوامش الربح." },
  { cat: "ح6 - القوى الخمس", q: "ما هي القوة الثانية في نموذج بورتر: تهديد الدخول الجديد؟", a: "احتمالية دخول منافسين جدد إلى السوق. حواجز الدخول: وفورات الحجم (تكلفة أقل للكميات الكبيرة)، تمايز المنتج (ولاء العملاء للعلامات التجارية)، رأس المال (متطلبات استثمارية عالية)، قنوات التوزيع (صعوبة الوصول إليها)، القيود الحكومية (تراخيص وتنظيمات). نتائج حواجز الدخول المنخفضة: سهولة دخول منافسين جدد، ضغط على الأسعار، الحاجة للابتكار المستمر." },
  { cat: "ح6 - القوى الخمس", q: "ما هي القوة الثالثة (قوة الموردين) والرابعة (قوة المشترين) في نموذج بورتر؟", a: "قوة الموردين: تزداد عند — عدد قليل من الموردين، صعوبة التعويض (منتج فريد)، تكاليف تحويل مرتفعة. النتائج: ارتفاع أسعار المدخلات، انخفاض الجودة، انخفاض هامش الربح. قوة المشترين: تزداد عند — عدد قليل من المشترين، تكاليف تحويل منخفضة، حساسية عالية للأسعار، معلومات كاملة. النتائج: ضغط لخفض الأسعار، مطالبة بجودة أعلى." },
  { cat: "ح6 - القوى الخمس", q: "ما هي القوة الخامسة (تهديد المنتجات البديلة) وما أمثلتها؟", a: "احتمالية أن يتحول العملاء إلى منتجات أو خدمات بديلة تحقق نفس الغرض. العوامل المزيدة: جودة بديلة مقارنة أو أفضل، سعر البديل أقل، تكاليف تحويل منخفضة، رغبة المستهلك في التجربة. أمثلة: المشروبات الغازية ← العصائر الطبيعية، السينما ← منصات البث (Netflix)، التاكسي ← تطبيقات النقل (Uber)." },
  { cat: "ح6 - القوى الخمس", q: "كيف تُطبّق القوى الخمس لبورتر على سوق توصيل الطعام في المغرب؟", a: "1) المنافسة الحالية: قوية جداً (Jumia, Glovo, Kooul, Done). 2) تهديد الدخول: متوسط (التطبيقات تسهل الدخول لكن بناء قاعدة عملاء يحتاج استثماراً كبيراً). 3) قوة الموردين (المطاعم): متوسطة (تعددها يقلل قوتها، لكن المطاعم الصحية المتخصصة قليلة). 4) قوة المشترين: قوية (سهولة التحويل بين التطبيقات، حساسية للعروض). 5) تهديد البدائل: متوسط (الطلب المباشر من المطاعم، الطبخ في المنزل). الاستراتيجية: التخصص في الوجبات الصحية." },
  { cat: "ح6 - إنشاء المقاولة", q: "ما هي خطوات إنشاء المقاولة في المغرب بالترتيب؟", a: "1) الفكرة ودراسة الجدوى. 2) اختيار الشكل القانوني (Auto-entrepreneur, SARL, SA, SAS). 3) الشهادة السلبية من OMPIC (حجز الاسم التجاري، 48 ساعة، صالحة 6 أشهر). 4) إعداد النظام الأساسي (القوانين الداخلية، حقوق والتزامات الشركاء). 5) فتح حساب بنكي وإيداع رأس المال. 6) التسجيل في السجل التجاري لدى CRI. 7) الحصول على السجل الضريبي (Identifiant Fiscal - IF). 8) التسجيل في CNSS. المدة: 2-4 أسابيع مع التحضير الجيد والوثائق الكاملة." },
  { cat: "ح6 - الأشكال القانونية", q: "ما هو نظام المقاول الذاتي (Auto-entrepreneur) وما شروطه وضرائبه؟", a: "نظام قانوني مبسط للأفراد الراغبين في ممارسة نشاط تجاري أو مهني أو حرفي. الشروط: عدم ممارسة نشاط مهني آخر، عدم التوظيف (يمكن الاستعانة بمتدربين)، الدخل السنوي الأقصى 500,000 درهم. الضرائب: 2% للأنشطة التجارية، 1% للأنشطة المهنية، إعفاء لأول 250,000 درهم (لمدة 3 سنوات). يناسب: اختبار فكرة ريادية، مشاريع صغيرة لا تتطلب رأس مال كبير." },
  { cat: "ح6 - الأشكال القانونية", q: "ما هي مميزات وعيوب نظام المقاول الذاتي؟", a: "المميزات: إجراءات مبسطة وسريعة، رسوم تسجيل مخفضة، محاسبة مبسطة جداً، إعفاء ضريبي جزئي، مرونة في العمل. العيوب: مسؤولية غير محدودة (لا فصل بين الذمة الشخصية والتجارية)، صعوبة الحصول على تمويل، سقف دخل محدود (500,000 درهم)، صعوبة التوسع، عدم مصداقية مع بعض العملاء." },
  { cat: "ح6 - الأشكال القانونية", q: "ما هي شركة ذات المسؤولية المحدودة SARL وما خصائصها؟", a: "الشكل الأكثر شيوعاً في المغرب للمشاريع الصغيرة والمتوسطة. الشروط: 2 إلى 50 شريك، رأس المال غير محدد قانونياً، المسؤولية محدودة بالمساهمة في رأس المال، يمكن تفويض مدير أو أكثر. المميزات: حماية الممتلكات الشخصية، مرونة في الإدارة، شعبية لدى البنوك، إمكانية التوسع. العيوب: التزامات إدارية أكثر، تكاليف تأسيس أعلى، محاسبة أكثر تعقيداً." },
  { cat: "ح6 - الأشكال القانونية", q: "ما هو SARL AU وما الفرق بينه وبين المقاول الذاتي وبين SARL؟", a: "SARL AU (شخص واحد): نسخة من SARL لشخص واحد فقط. يجمع بين مميزات SARL واستقلالية المقاول الذاتي. المميزات مقارنة بالمقاول الذاتي: مسؤولية محدودة (فصل الذمة الشخصية عن الشركة)، مصداقية أكبر، إمكانية التوسع والتوظيف. الفرق عن SARL العادية: شريك واحد فقط، استقلالية تامة في القرار بدون شركاء للتشاور." },
  { cat: "ح6 - الأشكال القانونية", q: "ما هي شركة المساهمة SA ومتى تكون الخيار الأمثل؟", a: "الشكل المناسب للمشاريع الكبيرة والمتوسطة التي تخطط للنمو أو الطرح في البورصة. الشروط: 5 مساهمين على الأقل، رأس المال الأدنى 300,000 درهم (غير المدرجة)، مجلس إدارة + مدير عام، مراقبون للحسابات. المميزات: جمع التمويل بسهولة (طرح أسهم)، مصداقية عالية، إمكانية الاكتتاب العام. العيوب: تعقيد إداري كبير، رقابة مشددة، تكاليف تأسيس وتشغيل عالية. نصيحة: SA للمشاريع الكبيرة التي تحتاج تمويلاً ضخماً." },
  { cat: "ح6 - التمويل", q: "ما هو رأس المال المبدئي ورأس المال العامل وكيف يُحسب إجمالي الاحتياجات التمويلية؟", a: "رأس المال المبدئي: الاستثمار الأولي (تطوير المنتج، التجهيزات والمعدات، التسويق الأولي، رأس المال العامل 3-6 أشهر). رأس المال العامل: النقدية المتاحة للتشغيل اليومي (دفع الموردين، رواتب الموظفين، الإيجار، مصاريف التشغيل). معادلة الحساب: تكاليف التأسيس + تكاليف التجهيز + رأس المال العامل (3-6 أشهر) + احتياطي طوارئ (10-20%) = إجمالي الاحتياجات التمويلية." },
  { cat: "ح6 - التمويل", q: "ما هي مصادر التمويل المتاحة للمقاولات الناشئة في المغرب؟", a: "1) التمويل الذاتي: مدخرات شخصية، مساهمة العائلة والأصدقاء. 2) القروض البنكية: Attijariwafa، BMCE، البنك الشعبي. 3) القروض المصغرة: الجمعيات المالية (Al Amana, FONDEP). 4) صناديق الاستثمار: Maroc Numeric Fund، Azur Innovation Fund. 5) برامج الدعم الحكومي: برنامج Forsa، Awrach، Indh." },
  { cat: "ح6 - التمويل", q: "ما الفرق بين التكاليف الثابتة والتكاليف المتغيرة وما أهمية التمييز بينهما؟", a: "التكاليف الثابتة: لا تتغير مع حجم الإنتاج. أمثلة: الإيجار الشهري، رواتب الموظفين الدائمين، التأمينات، الاشتراكات (كهرباء، إنترنت)، استهلاك الأصول الثابتة. التكاليف المتغيرة: تتغير بشكل مباشر مع حجم الإنتاج. أمثلة: المواد الخام، عمولات المبيعات، تكاليف الشحن والتوصيل، التغليف، رسوم المعالجة. الأهمية: ضروري لحساب نقطة التعادل وتحديد هامش الربح والتسعير الصحيح." },
  { cat: "ح6 - نقطة التعادل", q: "ما هي نقطة التعادل وما معادلتها وأهميتها للمقاول؟", a: "نقطة التعادل: النقطة التي تتعادل فيها الإيرادات الكلية مع التكاليف الكلية — لا ربح ولا خسارة. المعادلة: نقطة التعادل (بالوحدات) = التكاليف الثابتة ÷ (سعر الوحدة − تكلفة الوحدة المتغيرة). الأهمية: تحديد الحد الأدنى للمبيعات، تقييم الجدوى الاقتصادية، المقارنة بين مشاريع مختلفة، إدارة المخاطر. النصيحة: الهدف تجاوز نقطة التعادل بأمان مالٍ كافٍ (20-30% على الأقل)." },
  { cat: "ح6 - نقطة التعادل", q: "تطبيق عملي: مصنع صغير للعصائر — كيف تحسب نقطة التعادل؟", a: "البيانات: تكاليف ثابتة شهرية = 15,000 درهم، سعر العبوة = 25 درهم، التكلفة المتغيرة للعبوة = 15 درهم. الحل: نقطة التعادل = 15,000 ÷ (25 − 15) = 15,000 ÷ 10 = 1,500 عبوة/شهر. نقطة التعادل بالقيمة = 1,500 × 25 = 37,500 درهم/شهر. أي يجب بيع 1,500 عبوة شهرياً على الأقل قبل تحقيق أي ربح." },
  { cat: "ح6 - دراسة حالة مراكش", q: "ما هي نتائج تحليل حجم السوق لتطبيق توصيل وجبات صحية في مراكش؟", a: "TAM (السوق الكلي): 500M درهم — سوق توصيل الطعام في المغرب. SAM (السوق المخدم): 80M درهم — سوق مراكش + الوجبات الصحية. SOM (السوق المحقق): 4M درهم — هدف 5% من SAM في السنة الأولى. الفئة المستهدفة: 25-40 سنة، دخل 8,000-25,000 درهم/شهر، يهتمون بالصحة واللياقة، يستخدمون التطبيقات بكثرة." },
  { cat: "ح6 - دراسة حالة مراكش", q: "ما هي نتائج الاستبيان (100 مستجيب) لتطبيق الوجبات الصحية في مراكش؟", a: "78% يأكلون خارج المنزل. 65% يهتمون بالأكل الصحي. 82% يستخدمون تطبيقات التوصيل. 45% مستعدون لدفع 20-30% إضافية للجودة. متوسط قيمة الطلبية المتوقعة: 120-150 درهم مقابل 80-100 درهم للمنافسين العاديين. الاستنتاج: طلب حقيقي على الوجبات الصحية في مراكش والفئة المستهدفة لديها القدرة الشرائية والاستعداد للدفع مقابل الجودة." },
  { cat: "ح6 - الأخطاء الشائعة", q: "ما هي الأخطاء الشائعة الستة في دراسة السوق؟", a: "1) الاعتماد على الافتراضات الشخصية: الاعتقاد بأن ما نحبه سيكون ناجحاً دون التحقق. 2) عينة صغيرة أو غير ممثلة: الاعتماد على 5-10 أشخاص فقط. الحل: عينة كافية 30-50 على الأقل. 3) أسئلة موجهة أو غير واضحة: صياغة تؤدي إلى إجابات معينة. 4) تجاهل المنافسة: التركيز فقط على المنتج دون دراسة ما يقدمه المنافسون. 5) عدم تحديث البيانات: الاعتماد على بيانات قديمة (أكثر من 1-2 سنة). 6) الاستعجال في الاستنتاجات: التسرع دون تحليل عميق." },
];

    { term: "مثال Decathlon (تنظيمي)", def: "هيكلة مرنة تتحكم في كل مراحل القيمة. فرق مستقلة لكل رياضة. تنسيق فعّال بين التصميم والإنتاج والتسويق." },
    { term: "مثال Spotify (تمثيلي)", def: "تفاوض مع شركات إنتاج كبار رغم كونها ناشئة. نموذج يوازن بين الفنانين والمستخدمين. إقناع المستثمرين في سوق غير مضمون." },
    { term: "مثال Dyson (المخاطرة)", def: "5000+ نموذج أولي. تكلفة مالية شخصية مرتفعة. رفض الشركات المصنعة. الاستمرار رغم الفشل المتكرر → ميزة تنافسية قوية." },
  ]},
  { title: "الحصة 3 - الكفاءات الريادية", rows: [
    { term: "الكفاءات التقنية", def: "فهم جوهر النشاط (رقمي/صناعي/خدمي)، الإلمام بالأسس التقنية، فهم خصائص المنتج، تحليل القيمة المقدمة للزبون. الهدف: اتخاذ قرارات تقنية واعية لا أن يكون خبيراً." },
    { term: "الكفاءات التسييرية", def: "التخطيط المرحلي (خطط وأهداف ومسؤوليات لكل مرحلة)، إدارة الوقت والأولويات، اتخاذ القرار تحت الضغط، التعامل مع المشكلات غير المتوقعة." },
    { term: "الكفاءات الإنسانية", def: "مع النفس: الوعي بالذات، ضبط الانفعالات. مع الفريق: التواصل الفعال، التحفيز. مع المحيط: التعامل مع الشركاء، بناء علاقات الزبائن. مهارات: القيادة التحفيزية، العمل الجماعي، الذكاء العاطفي." },
    { term: "غياب الكفاءات التقنية", def: "منتجات غير قابلة للتطوير (دون مراعاة التوسع المستقبلي)، ومنتجات غير متوافقة مع حاجات السوق." },
    { term: "غياب الكفاءات التسييرية", def: "غياب التخطيط الاستراتيجي، ضعف المتابعة والتنفيذ، قرارات ارتجالية → نفاد الموارد قبل الوصول إلى السوق." },
    { term: "غياب الكفاءات الإنسانية", def: "نزاعات داخل الفريق، غياب الثقة، ضعف القيادة → تفكك البنية الداخلية وضعف الأداء العام." },
    { term: "التوازن بين الكفاءات الثلاث", def: "رائد الأعمال الناجح يجمع التقنية + التسييرية + الإنسانية → مشروع مبتكر وفعّال ومستدام وإنساني. هذا التوازن هو ما يميز القادة الحقيقيين." },
  ]},
  { title: "الحصة 3 - أنماط ريادة الأعمال", rows: [
    { term: "ريادة الأعمال المبتكرة", def: "القوة الدافعة للتغيير والتقدم. تطوير حلول جديدة وغير تقليدية. الابتكار يشمل التكنولوجيا + نماذج العمل + طرق خلق القيمة. الابتكار هو جوهر النجاح (ليس اختراعاً كلياً)." },
    { term: "ريادة الأعمال الاجتماعية", def: "معالجة التحديات المجتمعية (فقر، تعليم، صحة) بأساليب مبتكرة ومستدامة. الهدف: إحداث تغيير اجتماعي إيجابي لا الربح فقط. النجاح يُقاس بعمق الأثر الاجتماعي. توازن بين الربح والرسالة." },
    { term: "ريادة الأعمال القروية", def: "محرك للتنمية المحلية. تستغل الموارد الطبيعية والبشرية في المناطق الريفية. تخلق فرص عمل مستدامة وتقوي الاقتصادات المحلية. تحد من الهجرة وتقلص الفوارق المجالية." },
    { term: "ريادة الأعمال النسائية", def: "التمكين الاقتصادي للمرأة عبر دعم تأسيس مشاريعها. تتجاوز العوائق الاجتماعية والثقافية والقانونية. تعزز استقلاليتها وقدرتها على القرار. تُدمج طاقات مُهمَّشة في الدورة الاقتصادية." },
    { term: "قياس النجاح في الريادة الاجتماعية", def: "يتجاوز المقاييس المالية التقليدية ليركز على حجم وعمق الأثر الاجتماعي المتحقق." },
    { term: "ثورة في الأفكار ونماذج العمل", def: "ريادة مبتكرة = حلول جديدة + نماذج عمل غير تقليدية (رقمية أو قائمة على المشاركة) + استهداف أسواق جديدة غير مستغلة." },
  ]},
  { title: "الحصة 4 - السياق المغربي والإحصائيات", rows: [
    { term: "مؤشر السياق الوطني GEM 2024/25", def: "3.9 من 10 — تراجع من 4.3 في العامين السابقين" },

    { term: "الحاجة مقابل الفرصة", def: "87.2% يبدؤون بدافع الحاجة — مما يؤثر سلباً على الاستدامة والجودة" },
    { term: "التعريف في السياق المغربي", def: "ريادة الأعمال = خلق قيمة (حلول جديدة) + عدم اليقين (مخاطر محسوبة) + السياق (الإطار المحلي المحدد)" },
  ]},
  { title: "الحصة 4 - المعيقات الريادية في المغرب", rows: [
    { term: "معيقات فردية", def: "ضعف الخبرة التسييرية + نقص الثقافة الريادية + الخوف من الفشل (52.3%) + ضعف الشبكات" },
    { term: "معيقات مالية", def: "صعوبة التمويل البنكي + الضمانات التعجيزية + ضعف التمويل الأولي + رأس المال الجريء 176.9 مليون دولار فقط" },
    { term: "معيقات إدارية", def: "تعقيد المساطر + بطء الإجراءات البيروقراطية + تعدد الجهات وضعف التنسيق" },
    { term: "معيقات سوقية", def: "القدرة الشرائية المحدودة + القطاع غير الهيكل + المنافسة الشرسة + ضعف الثقة الرقمية" },
    { term: "معيقات ثقافية", def: "ثقافة الوظيفة العمومية + الخوف من الفشل + ضغط الأسرة + النظرة الاجتماعية السلبية لرجل الأعمال" },
    { term: "ارتباط المعيقات", def: "نقص الخبرة يزيد من صعوبة الحصول على التمويل. الضغوط المالية تؤثر على جودة اتخاذ القرارات." },
  ]},
  { title: "الحصة 4 - البيئة الريادية في المغرب", rows: [
    { term: "تعريف البيئة الريادية", def: "نظام متكامل من العوامل المؤسساتية والثقافية والاقتصادية يؤثر على إنشاء المقاولات الناشئة ونموها. نظام ديناميكي لا مجموعة عناصر منفصلة." },
    { term: "نقاط القوة", def: "الموقع الجغرافي الاستراتيجي (بوابة إفريقيا) + الاستقرار السياسي + بنية تحتية رقمية متطورة + سوق إفريقي واعد + دعم حكومي متزايد" },
    { term: "نقاط الضعف", def: "ضعف الابتكار (R&D 0.6%) + جفوة الجامعة-المقاولة + محدودية البحث العلمي + تفاوت جغرافي كبير بين المدن والأرياف" },
    { term: "الاستثمارات الأجنبية", def: "أكثر من 950 شركة فرنسية موجودة في المغرب — دليل على الاستقرار والجاذبية" },
    { term: "البيئة الريادية — خلاصة", def: "بيئة انتقالية في طور التطور: نقاط قوة هامة (الاستقرار، الدعم، الموقع) + نقاط ضعف بنيوية (الابتكار، التعليم، التجانس)" },
  ]},
  { title: "الحصة 4 - الفرص الريادية", rows: [
    { term: "الاقتصاد الرقمي", def: "التجارة الإلكترونية + التطبيقات المحمولة + الخدمات الرقمية. استراتيجية 2030: 3000 شركة ناشئة و100 مليار درهم." },
    { term: "الفلاحة الذكية AgriTech", def: "IoT + ذكاء اصطناعي + بيانات ضخمة. الفلاحة: 15% من GDP، 40% من الشغل، 14 مليار درهم استثمار." },
    { term: "الاقتصاد الأخضر", def: "الطاقات المتجددة (هدف 52% بحلول 2030) + الهيدروجين الأخضر + التدوير. المغرب يستورد 90% طاقته → فرصة ضخمة." },
    { term: "السياحة البديلة", def: "سياحة قروية + بيئية + ثقافية + فرصة كأس العالم 2030 (26 مليون زائر). السياحة = 7% من الناتج المحلي." },
    { term: "السياحة — كأس العالم 2030", def: "استثمارات بمليارات اليورو في البنية التحتية والفنادق، هدف 26 مليون زائر بحلول 2030." },
  ]},
  { title: "الحصة 4 - آليات الدعم والمواكبة", rows: [
    { term: "برنامج انطلاقة", def: "30 مليار درهم / 5 سنوات. تمويل حتى 1.2 مليون درهم. فائدة 1.75% قروي و2% حضري. للشباب والمقاولات الصغرى والفلاحين. START-TPE: قرض مجاني حتى 50,000 درهم." },
    { term: "برنامج فرصة", def: "دعم بدون شروط مسبقة. حوالي 100,000 درهم. مفتوح للجميع: حاملو الأفكار، المقاولون الذاتيون، الشركات الناشئة. تغطية 12 جهة." },
    { term: "صندوق الابتكار", def: "دعم R&D وبراءات الاختراع. حتى 5 ملايين درهم. شراكة وزارة الصناعة + Maroc PME + الاتحاد العام." },
    { term: "Technopark", def: "3000+ مقاولة ناشئة منذ 2001. معدل استدامة 89% بعد 5 سنوات. 15,000 منصب شغل. تعميم على 12 جهة بحلول 2027." },
    { term: "Maroc PME", def: "الوكالة الوطنية للنهوض بالمقاولة الصغرى والمتوسطة. برنامج 'استثمار': تغطية 20-30% من التكلفة. شراكة مع البنوك." },
    { term: "CRI", def: "12 مركزاً جهوياً للاستثمار. نافذة واحدة لتبسيط إجراءات الاستثمار. تسهيل الحلول العقارية والأرضية." },
    { term: "صندوق محمد السادس للاستثمار", def: "صناديق استثمار موضوعاتية (فلاحة، تكنولوجيا، صحة). منحة CapAccess لتمويل الديون الثانوية. دعم المشاريع الهيكلية الكبرى." },
  ]},
  { title: "الحصة 4 - النماذج المغربية الناجحة", rows: [
    { term: "Chari — الفكرة", def: "تطبيق B2B لتجارة إلكترونية يخدم 200,000 متجر صغير (80% مبيعات التجزئة في المغرب)" },
    { term: "Chari — النموذج والنجاح", def: "E-commerce + Fintech. قيمة 125 مليون دولار. 25,000+ متجر. 185+ موظف. التوسع في المغرب وتونس وساحل العاج." },
    { term: "Chari — درس الريادة", def: "فهم عميق للسياق المحلي + استخدام WhatsApp للطلبات + استحواذ على Karny للمحاسبة + التوسع الإقليمي الذكي" },
    { term: "Terraa", def: "منصة B2B للمنتجات الغذائية الطازجة بين المزارعين والتجار. رفعت 1.5 مليون دولار في 2023 (الأكبر في تاريخ المغرب)." },
    { term: "كومير", def: "إعادة تدوير جلود الأسماك لإنتاج جلود بحرية عالية الجودة. 40+ طن منذ 2016. الاقتصاد الأخضر + الموضة المستدامة." },
    { term: "Kenzbladi", def: "تمويل تعاوني (Crowdfunding) لدعم إنتاج وتسويق المنتجات الفلاحية. AgriTech + Fintech." },
    { term: "عوامل نجاح مشتركة", def: "1) فهم عميق للسياق المحلي 2) التكيف مع احتياجات العملاء 3) التوسع الإقليمي الذكي 4) نموذج أعمال مستدام 5) الجمع بين قطاعين (E-commerce+Fintech، AgriTech+Supply Chain)" },
  ]},
  { title: "الحصة 5 - الفكرة مقابل الفرصة الريادية", rows: [
    { term: "الفكرة", def: "مفهوم أو تصور لحل ما. قد تكون نظرية وغير مختبرة، لا تتطلب بالضرورة وجود سوق، قد تكون مبتكرة لكن غير قابلة للتطبيق، لا تضمن الربحية." },
    { term: "الفرصة الريادية", def: "فكرة قابلة للتنفيذ تلبي حاجة حقيقية في السوق. مبنية على حاجة حقيقية، قابلة للتطبيق بالموارد المتاحة، تقدم قيمة مضافة للعملاء، تحقق ربحية مستدامة." },
    { term: "معيار الحاجة", def: "الفكرة: قد تكون مفترضة. الفرصة: مُثبتة ومُحتملة." },
    { term: "معيار السوق", def: "الفكرة: غير محدد بالضرورة. الفرصة: مُحدد وقابل للقياس." },
    { term: "معيار الربحية", def: "الفكرة: غير مضمونة. الفرصة: مُحتملة ومُحسوبة." },
    { term: "معيار التنفيذ", def: "الفكرة: قد يكون غير واضح. الفرصة: خطة واضحة وقابلة للتطبيق." },
    { term: "معيار التميز", def: "الفكرة: قد لا يكون موجوداً. الفرصة: ميزة تنافسية واضحة." },
    { term: "الخلاصة", def: "الفكرة هي البذرة، والفرصة هي الشجرة المثمرة. الفرق يكمن في التحقق والتخطيط وليس فقط في الفكرة نفسها." },
  ]},
  { title: "الحصة 5 - النظريات الثلاث في ريادة الأعمال", rows: [
    { term: "Schumpeter 1934 — الابتكار التخريبي", def: "الريادي هو المبدع الذي يحدث تخريباً إبداعياً من خلال تقديم تركيبات جديدة من الموارد. أنواع الابتكار: منتج جديد، طريقة إنتاج جديدة، سوق جديد، مصدر مواد خام جديد." },
    { term: "Kirzner 1973 — الاستبصار الريادي", def: "الريادي هو مُستبصر يتميز باليقظة لاكتشاف الفرص المُغفلة في السوق. خصائصه: اليقظة للفرص، رؤية ما يغفل عنه الآخرون، التصرف السريع، إعادة توازن السوق." },
    { term: "Shane 2003 — الفرصة الريادية", def: "الفرصة الريادية هي حالة تتيح إنشاء سلع/خدمات جديدة بأسعار تتجاوز تكاليف إنتاجها. مصادر الفرصة: التغيرات التكنولوجية، السياسية، الاجتماعية، عدم كفاءة السوق." },
    { term: "التكامل النظري", def: "الثلاثة لا تتعارض بل تتكامل: Schumpeter (الابتكار والتخريب الإبداعي) + Kirzner (الاستبصار واليقظة) + Shane (الفرصة كمفهوم مركزي) = فهم شامل لظاهرة ريادة الأعمال." },
  ]},
  { title: "الحصة 5 - مصادر الأفكار الريادية", rows: [
    { term: "المشكلات اليومية", def: "كل مشكلة تواجهها في حياتك اليومية هي فرصة محتملة لإيجاد حل. أمثلة مغربية: صعوبة إيجاد موقف سيارات، تأخر خدمات التوصيل، صعوبة الوصول لخدمات الصحة، تعقيد الإجراءات الإدارية." },
    { term: "التغيرات التكنولوجية", def: "التطور التكنولوجي يخلق فرصاً جديدة لتحسين المنتجات والخدمات. أمثلة: انتشار الهواتف الذكية، تطور الدفع الإلكتروني، الذكاء الاصطناعي، إنترنت الأشياء." },
    { term: "التغيرات الاجتماعية", def: "التغيرات في سلوك المستهلكين ونمط الحياة تخلق احتياجات جديدة. أمثلة: زيادة الوعي البيئي، التوجه نحو الصحة واللياقة، تغير أنماط الاستهلاك، زيادة مشاركة المرأة." },
    { term: "الفجوات في السوق", def: "عدم تلبية حاجة معينة في السوق يمثل فرصة ذهبية لمن يكتشفها ويسدها. أمثلة: نقص خدمات للأشخاص ذوي الإعاقة، خدمات رعاية المسنين، منتجات عضوية محلية، تعليم مهني متخصص." },
    { term: "التنظيمات الجديدة", def: "التغيرات في القوانين واللوائح يمكن أن تفتح أبواباً جديدة لأنشطة تجارية. أمثلة: تراخيص FinTech، دعم الاقتصاد الأخضر، برنامج فرصة، إصلاحات ضريبية." },
  ]},
  { title: "الحصة 5 - تقنيات توليد الأفكار", rows: [
    { term: "العصف الذهني (Brainstorming)", def: "تقنية جماعية لتوليد أكبر عدد ممكن من الأفكار. القواعد: لا نقد، الحرية، الكم، البناء. خطوات: تحديد المشكلة → تشكيل الفريق → شرح القواعد → توليد الأفكار (15-30 دقيقة) → تقييم الأفكار." },
    { term: "SCAMPER", def: "Substitute (استبدال) + Combine (دمج) + Adapt (تكييف) + Modify (تعديل) + Put to other uses (استخدامات أخرى) + Eliminate (إزالة) + Reverse (عكس). أداة منهجية للتلاعب بعناصر المنتج أو الخدمة الموجودة." },
    { term: "التفكير التصميمي (Design Thinking)", def: "منهجية إنسانية تركز على فهم المستخدم. المراحل الخمس: Empathize (التعاطف) → Define (التعريف) → Ideate (التوليد) → Prototype (النموذج) → Test (الاختبار). تتميز بالتكرارية وتشجيع التعلم من الأخطاء." },
    { term: "أخطاء العصف الذهني", def: "النقد المبكر (يقتل الإبداع)، عدم التحضير (يؤدي لحصص غير منتجة)، سيطرة الأفراد (يمنع مشاركة الجميع)." },

// Flashcard logic
let currentIndex = 0;
let shuffled = [...cards];
let isFlipped = false;

function renderCard() {
  const card = shuffled[currentIndex];
  document.getElementById('fc-category').textContent = card.cat;
  document.getElementById('fc-question').textContent = card.q;
  document.getElementById('fc-answer').textContent = card.a;
  document.getElementById('fc-progress-label').textContent = `البطاقة ${currentIndex + 1} من ${shuffled.length}`;
  document.getElementById('fc-progress').style.width = `${((currentIndex + 1) / shuffled.length) * 100}%`;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  isFlipped = false;
}

function flipCard() {
  const fc = document.getElementById('flashcard');
  fc.classList.toggle('flipped');
  isFlipped = !isFlipped;
}

function nextCard() {
  if (currentIndex < shuffled.length - 1) currentIndex++;
  else currentIndex = 0;
  renderCard();
}

function prevCard() {
  if (currentIndex > 0) currentIndex--;
  else currentIndex = shuffled.length - 1;
  renderCard();
}

function markCard(known) {
  // Visual feedback
  const fc = document.getElementById('flashcard');
  fc.style.transition = 'transform 0.3s, opacity 0.3s';
  fc.style.opacity = '0.3';
  setTimeout(() => {
    fc.style.opacity = '1';
    nextCard();
  }, 300);
}

function shuffleCards() {
  shuffled = [...cards].sort(() => Math.random() - 0.5);
  currentIndex = 0;
  renderCard();
}

function resetCards() {
  shuffled = [...cards];
  currentIndex = 0;
  renderCard();
}

// Quiz logic
const quizQuestions = cards.map((card, i) => {
  const wrong = cards.filter((_, j) => j !== i).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.a);
  const options = [...wrong, card.a].sort(() => Math.random() - 0.5);
  return { q: card.q, cat: card.cat, correct: card.a, options };
});

let quizIndex = 0;
let quizScore = 0;
let quizAnswered = false;

function renderQuiz() {
  const container = document.getElementById('quiz-container');
  if (quizIndex >= quizQuestions.length) {
    const pct = Math.round((quizScore / quizQuestions.length) * 100);
    container.innerHTML = `<div class="quiz-score">
      <h2>انتهى الاختبار! 🎉</h2>
      <div class="score-num">${quizScore}/${quizQuestions.length}</div>
      <p style="color:var(--muted);margin:12px 0 24px;">${pct}% صحيح</p>
      <p style="color:var(--muted);margin-bottom:20px;">${pct >= 80 ? '🏆 ممتاز! أنت جاهز للاختبار' : pct >= 60 ? '👍 جيد، راجع البطاقات التعليمية أكثر' : '📚 راجع الملخص الشامل وأعد المحاولة'}</p>
      <button class="btn btn-primary" onclick="restartQuiz()">إعادة الاختبار</button>
    </div>`;
    return;
  }
  const q = quizQuestions[quizIndex];
  container.innerHTML = `
    <div class="quiz-card">
      <span class="quiz-category">${q.cat} — سؤال ${quizIndex + 1} من ${quizQuestions.length}</span>
      <div class="quiz-q">${q.q}</div>
      <div class="options" id="options"></div>
    </div>`;
  const opts = document.getElementById('options');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(btn, opt, q.correct);
    opts.appendChild(btn);
  });
}

function checkAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => {
    o.disabled = true;
    if (o.textContent === correct) o.classList.add('correct');
  });
  if (chosen === correct) {
    btn.classList.add('correct');
    quizScore++;
  } else {
    btn.classList.add('wrong');
  }
  setTimeout(() => {
    quizIndex++;
    quizAnswered = false;
    renderQuiz();
  }, 1200);
}

function restartQuiz() {
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = false;
  quizQuestions.forEach(q => {
    const wrong = cards.filter(c => c.a !== q.correct).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.a);
    q.options = [...wrong, q.correct].sort(() => Math.random() - 0.5);
  });
  renderQuiz();
}

function startMatch() {

  matchTerms = subset.map(p => ({ text: p.term, type: 'term', match: p.def, matched: false }));

  document.getElementById('match-total').textContent = subset.length;
  document.getElementById('match-score').textContent = 0;

function renderMatch(items) {
  const grid = document.getElementById('match-grid');
  grid.innerHTML = items.map((item, i) => `
    <div class="match-item${item.matched ? ' matched' : ''}" 
         onclick="selectMatch(this, '${encodeURIComponent(item.text)}', '${encodeURIComponent(item.match)}', '${item.type}')"
         data-text="${encodeURIComponent(item.text)}">
      ${item.text}
    </div>
  `).join('');
}

let matchItems = [];

function startMatchFull() {
  matchSelected = null;
  matchMatched = 0;
  const subset = [...matchPairs].sort(() => Math.random() - 0.5).slice(0, 6);
  matchItems = [
    ...subset.map(p => ({ text: p.term, match: p.def, matched: false })),
    ...subset.map(p => ({ text: p.def, match: p.term, matched: false }))
  ].sort(() => Math.random() - 0.5);
  document.getElementById('match-total').textContent = subset.length;
  document.getElementById('match-score').textContent = 0;
  renderMatchFull();
}

function renderMatchFull() {
  const grid = document.getElementById('match-grid');
  grid.innerHTML = matchItems.map((item, i) => `
    <div class="match-item${item.matched ? ' matched' : ''}" 
         data-idx="${i}"
         onclick="clickMatch(${i})">
      ${item.text}
    </div>
  `).join('');
}

let matchSelectedIdx = null;

function clickMatch(idx) {
  const item = matchItems[idx];
  if (item.matched) return;
  const els = document.querySelectorAll('.match-item');

  if (matchSelectedIdx === null) {
    matchSelectedIdx = idx;
    els[idx].classList.add('selected');
    return;
  }

  if (matchSelectedIdx === idx) {
    els[idx].classList.remove('selected');
    matchSelectedIdx = null;
    return;
  }

  const first = matchItems[matchSelectedIdx];
  const second = matchItems[idx];

  if (first.match === second.text && second.match === first.text) {
    first.matched = true;
    second.matched = true;
    matchMatched++;
    document.getElementById('match-score').textContent = matchMatched;
    matchSelectedIdx = null;
    renderMatchFull();
    if (matchMatched === matchItems.length / 2) {
      setTimeout(() => alert('🎉 ممتاز! أكملت المطابقة!'), 200);
    }
  } else {
    els[matchSelectedIdx].classList.remove('selected');
    els[idx].classList.add('wrong-flash');
    els[matchSelectedIdx].classList.add('wrong-flash');
    setTimeout(() => renderMatchFull(), 600);
    matchSelectedIdx = null;
  }
}

function startMatch() { startMatchFull(); }

// Mode switching
function setMode(mode) {
  const allModes = ['flashcard','quiz','match','truefalse','fillin','timed','summary'];
  document.querySelectorAll('.mode-tab').forEach((t, i) => {
    t.classList.remove('active');
    if (allModes[i] === mode) t.classList.add('active');
  });
  allModes.forEach(m => {
    const el = document.getElementById(`mode-${m}`);
    if (el) el.style.display = m === mode ? 'block' : 'none';
  });
  if (mode === 'quiz') renderQuiz();
  if (mode === 'match') startMatch();
  if (mode === 'summary') renderSummary();
  if (mode === 'truefalse') initTrueFalse();
  if (mode === 'fillin') initFillIn();
  if (mode === 'timed') initTimed();
}
