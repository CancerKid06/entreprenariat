      <p style="color:var(--muted);margin:12px 0 24px;">${pct}% صحيح — ${pct >= 80 ? '🏆 ممتاز!' : pct >= 60 ? '👍 جيد، واصل المراجعة' : '📚 راجع المفاهيم من جديد'}</p>
      <button class="btn btn-primary" onclick="initTrueFalse()">إعادة الاختبار 🔄</button>
    </div>`;
    return;
  }
  const item = tfShuffled[tfIndex];
  container.innerHTML = `
    <div class="tf-score">السؤال <span>${tfIndex + 1}</span> من ${tfShuffled.length} — النقاط: <span>${tfScore}</span></div>
    <div class="tf-card">
      <div class="tf-statement">${item.statement}</div>
      <div class="tf-buttons">
        <button class="tf-btn tf-true" id="btn-true" onclick="answerTF(true)">✓ صحيح</button>
        <button class="tf-btn tf-false" id="btn-false" onclick="answerTF(false)">✗ خطأ</button>
      </div>
      <div class="tf-feedback" id="tf-feedback"></div>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <div class="progress-bar-wrap"><div class="progress-bar-inner" style="width:${((tfIndex)/tfShuffled.length)*100}%"></div></div>
    </div>`;
}

function answerTF(chosen) {
  if (tfAnswered) return;
  tfAnswered = true;
  const item = tfShuffled[tfIndex];
  const correct = chosen === item.answer;
  if (correct) tfScore++;
  document.getElementById('btn-true').disabled = true;
  document.getElementById('btn-false').disabled = true;
  const fb = document.getElementById('tf-feedback');
  fb.textContent = (correct ? '✅ صحيح! ' : '❌ خطأ! ') + item.explanation;
  fb.className = `tf-feedback show ${correct ? 'correct' : 'wrong'}`;
  setTimeout(() => { tfIndex++; tfAnswered = false; renderTF(); }, 2000);
}

// ===== FILL IN THE BLANK MODE =====
const fillInData = [
  { prompt: "ريادة الأعمال = فكرة + ___ + تنفيذ + قيمة", answer: "فرصة", distractors: ["تمويل", "شريك", "سوق"] },
  { prompt: "رائد الأعمال يختلف عن المدير في أنه يعمل في بيئة ___", answer: "غير مؤكدة", distractors: ["مستقرة", "منظمة", "بيروقراطية"] },
  { prompt: "___ = توليد أفكار جديدة، بينما الابتكار = تحويلها إلى منتج قابل للتنفيذ", answer: "الإبداع", distractors: ["الابتكار", "التخطيط", "التسويق"] },
  { prompt: "الخوف من الفشل في المغرب يبلغ ___% وفق مؤشر GEM 2024", answer: "52.3", distractors: ["87.2", "78.2", "12.5"] },
  { prompt: "معادلة نقطة التعادل = التكاليف الثابتة ÷ (سعر الوحدة − ___)", answer: "تكلفة الوحدة المتغيرة", distractors: ["الضرائب", "سعر المنافس", "رأس المال"] },
  { prompt: "___ هي المنهجية الإنسانية التي تركز على فهم المستخدم لتصميم حلول مبتكرة", answer: "Design Thinking", distractors: ["SCAMPER", "Porter 5", "SWOT"] },
  { prompt: "يمنح ___ الشهادة السلبية خلال 48 ساعة في المغرب", answer: "OMPIC", distractors: ["CRI", "CNSS", "Technopark"] },
  { prompt: "في مثال مصنع العصائر، نقطة التعادل = ___ عبوة/شهر", answer: "1,500", distractors: ["2,000", "1,200", "3,000"] },
  { prompt: "يُعرّف Kirzner الريادي بأنه يمتلك ___ خاصة لاكتشاف الفرص المُغفلة", answer: "يقظة", distractors: ["شجاعة", "تمويل", "خبرة"] },
  { prompt: "أداة ___ تولّد أفكاراً بالتلاعب بعناصر المنتج الموجود عبر 7 محاور", answer: "SCAMPER", distractors: ["Design Thinking", "SWOT", "Porter"] },
  { prompt: "SARL AU هي شركة ذات مسؤولية محدودة لـ ___ واحد", answer: "شخص", distractors: ["قطاع", "منتج", "عقد"] },
  { prompt: "___ = الجزء من السوق الذي يمكن تحقيقه فعلياً في السنة الأولى", answer: "SOM", distractors: ["TAM", "SAM", "GEM"] },
  { prompt: "مؤشر GEM للمغرب 2024 بلغ ___ من 10", answer: "3.9", distractors: ["4.3", "5.2", "7.8"] },
  { prompt: "الذكاء العاطفي يشمل 4 مكونات: الوعي بالذات، التحكم في المشاعر، ___ ، ومهارات التواصل", answer: "التعاطف", distractors: ["المنافسة", "الطموح", "الحدس"] },
  { prompt: "ريادة الأعمال الاجتماعية تضع ___ قبل الربح كمقياس للنجاح", answer: "الأثر الاجتماعي", distractors: ["الحجم", "الشهرة", "الإيرادات"] },
  { prompt: "نموذج القوى الخمس وضعه Michael Porter عام ___", answer: "1979", distractors: ["1985", "1990", "1970"] },
];

let fillIndex = 0, fillScore = 0, fillAnswered = false;
let fillShuffled = [];

function initFillIn() {
  fillShuffled = [...fillInData].sort(() => Math.random() - 0.5);
  fillIndex = 0; fillScore = 0; fillAnswered = false;
  renderFillIn();
}

function renderFillIn() {
  const container = document.getElementById('fillin-container');
  if (fillIndex >= fillShuffled.length) {
    const pct = Math.round((fillScore / fillShuffled.length) * 100);
    container.innerHTML = `<div class="quiz-score">
      <h2>انتهى اختبار أكمل الفراغ! 🎉</h2>
      <div class="score-num">${fillScore}/${fillShuffled.length}</div>
      <p style="color:var(--muted);margin:12px 0 24px;">${pct}% صحيح — ${pct >= 80 ? '🏆 رائع! معلوماتك متينة' : pct >= 60 ? '👍 جيد، راجع البطاقات مجدداً' : '📚 مراجعة إضافية مطلوبة'}</p>
      <button class="btn btn-primary" onclick="initFillIn()">إعادة الاختبار 🔄</button>
    </div>`;
    return;
  }
  const item = fillShuffled[fillIndex];
  const promptHtml = item.prompt.replace('___', '<span class="fillin-blank">________</span>');
  const opts = [...item.distractors, item.answer].sort(() => Math.random() - 0.5);
  container.innerHTML = `
    <div class="fillin-score">السؤال <span>${fillIndex + 1}</span> من ${fillShuffled.length} — النقاط: <span>${fillScore}</span></div>
    <div class="fillin-card">
      <div class="fillin-prompt">${promptHtml}</div>
      <div class="fillin-options" id="fillin-opts">
        ${opts.map(o => `<button class="fillin-option" onclick="checkFill(this,'${encodeURIComponent(o)}','${encodeURIComponent(item.answer)}')">${o}</button>`).join('')}
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-inner" style="width:${((fillIndex)/fillShuffled.length)*100}%"></div></div>`;
}

function checkFill(btn, chosen, correct) {
  if (fillAnswered) return;
  fillAnswered = true;
  const c = decodeURIComponent(correct);
  const ch = decodeURIComponent(chosen);
  document.querySelectorAll('.fillin-option').forEach(o => {
    o.disabled = true;
    if (o.textContent.trim() === c) o.classList.add('correct');
  });
  if (ch === c) { btn.classList.add('correct'); fillScore++; }
  else btn.classList.add('wrong');
  setTimeout(() => { fillIndex++; fillAnswered = false; renderFillIn(); }, 1400);
}

// ===== TIMED SPRINT MODE =====
let timedTimer = null, timedSeconds = 60, timedIdx = 0, timedCorrect = 0, timedTotal = 0;
let timedAnswered = false;
let timedQuestions = [];

function initTimed() {
  clearInterval(timedTimer);
  document.getElementById('timed-container').innerHTML = `
    <div class="timed-start">
      <h2>⏱️ سباق الزمن</h2>
      <p>لديك <strong style="color:var(--accent)">60 ثانية</strong> للإجابة على أكبر عدد ممكن من الأسئلة.<br>كل إجابة صحيحة = نقطة. الانتقال إلى السؤال التالي تلقائياً بعد كل إجابة.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
        <button class="btn btn-primary" onclick="startTimedGame(60)">⚡ 60 ثانية</button>
        <button class="btn btn-outline" onclick="startTimedGame(90)">🔥 90 ثانية</button>
        <button class="btn btn-outline" onclick="startTimedGame(120)">💪 120 ثانية</button>
      </div>
    </div>`;
}

function startTimedGame(duration) {
  clearInterval(timedTimer);
  timedSeconds = duration;
  timedIdx = 0; timedCorrect = 0; timedTotal = 0; timedAnswered = false;
  timedQuestions = cards.map((card, i) => {
    const wrong = cards.filter((_, j) => j !== i).sort(() => Math.random() - 0.5).slice(0, 3).map(c => c.a);
    return { q: card.q, cat: card.cat, correct: card.a, options: [...wrong, card.a].sort(() => Math.random() - 0.5) };
  }).sort(() => Math.random() - 0.5);
  timedTimer = setInterval(() => {
    timedSeconds--;
    const el = document.getElementById('timed-clock');
    if (el) {
      el.textContent = timedSeconds + 's';
      if (timedSeconds <= 10) el.classList.add('warning');
    }
    if (timedSeconds <= 0) { clearInterval(timedTimer); showTimedResults(); }
  }, 1000);
  renderTimedQ();
}

function renderTimedQ() {
  if (timedIdx >= timedQuestions.length) { showTimedResults(); return; }
  const q = timedQuestions[timedIdx];
  document.getElementById('timed-container').innerHTML = `
    <div class="timed-header">
      <div>
        <div class="timed-info">✅ <span>${timedCorrect}</span> صحيح | 📋 <span>${timedTotal}</span> أجبت</div>
      </div>
      <div class="timed-timer" id="timed-clock">${timedSeconds}s</div>
    </div>
    <div class="timed-card">
      <span class="timed-cat">${q.cat}</span>
      <div class="timed-q">${q.q}</div>
      <div class="timed-options" id="timed-opts">
        ${q.options.map(o => `<button class="timed-option" onclick="checkTimed(this,'${encodeURIComponent(o)}','${encodeURIComponent(q.correct)}')">${o}</button>`).join('')}
      </div>
    </div>`;
}

function checkTimed(btn, chosen, correct) {
  if (timedAnswered) return;
  timedAnswered = true;
  timedTotal++;
  const c = decodeURIComponent(correct);
  const ch = decodeURIComponent(chosen);
  document.querySelectorAll('.timed-option').forEach(o => {
    o.disabled = true;
    if (o.textContent.trim() === c) o.classList.add('correct');
  });
  if (ch === c) { btn.classList.add('correct'); timedCorrect++; }
  else btn.classList.add('wrong');
  setTimeout(() => { timedIdx++; timedAnswered = false; renderTimedQ(); }, 600);
}

function showTimedResults() {
  clearInterval(timedTimer);
  const pct = timedTotal > 0 ? Math.round((timedCorrect / timedTotal) * 100) : 0;
  const medals = timedCorrect >= 20 ? '🏆' : timedCorrect >= 12 ? '🥈' : timedCorrect >= 6 ? '🥉' : '📚';
  document.getElementById('timed-container').innerHTML = `
    <div class="timed-results">
      <div style="font-size:3rem;margin-bottom:8px;">${medals}</div>
      <h2 style="font-size:1.4rem;margin-bottom:4px;">انتهى الوقت!</h2>
      <div class="timed-big-score">${timedCorrect} نقطة</div>
      <div class="timed-stats">
        <div class="timed-stat"><div class="timed-stat-num">${timedTotal}</div><div class="timed-stat-label">أسئلة أجبت</div></div>
        <div class="timed-stat"><div class="timed-stat-num">${timedCorrect}</div><div class="timed-stat-label">إجابات صحيحة</div></div>
        <div class="timed-stat"><div class="timed-stat-num">${pct}%</div><div class="timed-stat-label">دقة الإجابات</div></div>
        <div class="timed-stat"><div class="timed-stat-num">${timedTotal - timedCorrect}</div><div class="timed-stat-label">أخطاء</div></div>
      </div>
      <p style="color:var(--muted);margin-bottom:24px;">${pct >= 80 ? 'دقة ممتازة! سرعة ومعرفة' : pct >= 60 ? 'جيد، حسّن سرعة استجابتك' : 'راجع المفاهيم وحاول مجدداً'}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="startTimedGame(60)">⚡ 60 ثانية</button>
        <button class="btn btn-outline" onclick="startTimedGame(90)">🔥 90 ثانية</button>
        <button class="btn btn-outline" onclick="startTimedGame(120)">💪 120 ثانية</button>
      </div>
    </div>`;
}

// Init
renderCard();
</script>
